worker_processes  1;

events {
  worker_connections  1024;
}

http {
  log_format upstream '$remote_addr - $host "$request" $status '
                      'upstream=$upstream_addr upstream_status=$upstream_status '
                      'request_time=$request_time upstream_response_time=$upstream_response_time';
  access_log /var/log/nginx/access.log upstream;

  upstream agentic_rag_upstream {
    server app-1:8081 max_fails=1 fail_timeout=5s;
    server app-2:8081 max_fails=1 fail_timeout=5s;
    keepalive 16;
  }

  server {
    listen 8080;

    location / {
      proxy_pass http://agentic_rag_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
      proxy_next_upstream_tries 2;
      add_header X-Upstream-Server $upstream_addr always;
    }
  }
}
