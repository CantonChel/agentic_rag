services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentic_rag}
      POSTGRES_USER: ${POSTGRES_USER:-agentic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentic}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentic} -d ${POSTGRES_DB:-agentic_rag}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "${PG_HOST_PORT:-35432}:5432"
    volumes:
      - phase4_pg_data:/var/lib/postgresql/data

  redis-master:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${REDIS_MASTER_HOST_PORT:-36379}:6379"
    volumes:
      - phase4_redis_master_data:/data
      - ./redis/redis-master.conf:/usr/local/etc/redis/redis.conf:ro

  redis-replica-1:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${REDIS_REPLICA_HOST_PORT:-36380}:6379"
    volumes:
      - phase4_redis_replica_1_data:/data
      - ./redis/redis-replica.conf:/usr/local/etc/redis/redis.conf:ro
    depends_on:
      redis-master:
        condition: service_started

  redis-sentinel-1:
    image: redis:7-alpine
    command:
      - /bin/sh
      - -c
      - cp /etc/redis-base/sentinel.conf /tmp/sentinel.conf && redis-server /tmp/sentinel.conf --sentinel
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${SENTINEL_1_HOST_PORT:-26379}:26379"
    volumes:
      - ./redis/sentinel.conf:/etc/redis-base/sentinel.conf:ro
    depends_on:
      redis-master:
        condition: service_started
      redis-replica-1:
        condition: service_started

  redis-sentinel-2:
    image: redis:7-alpine
    command:
      - /bin/sh
      - -c
      - cp /etc/redis-base/sentinel.conf /tmp/sentinel.conf && redis-server /tmp/sentinel.conf --sentinel
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${SENTINEL_2_HOST_PORT:-26380}:26379"
    volumes:
      - ./redis/sentinel.conf:/etc/redis-base/sentinel.conf:ro
    depends_on:
      redis-master:
        condition: service_started
      redis-replica-1:
        condition: service_started

  redis-sentinel-3:
    image: redis:7-alpine
    command:
      - /bin/sh
      - -c
      - cp /etc/redis-base/sentinel.conf /tmp/sentinel.conf && redis-server /tmp/sentinel.conf --sentinel
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${SENTINEL_3_HOST_PORT:-26381}:26379"
    volumes:
      - ./redis/sentinel.conf:/etc/redis-base/sentinel.conf:ro
    depends_on:
      redis-master:
        condition: service_started
      redis-replica-1:
        condition: service_started

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_HOST_PORT:-39000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-39001}:9001"
    volumes:
      - phase4_minio_data:/data

  docreader:
    build:
      context: ${DOCREADER_BUILD_CONTEXT:-../../app/docreader_service}
    environment:
      DOCREADER_PORT: 8090
      DOCREADER_WORKER_COUNT: 2
      DOCREADER_CALLBACK_SECRET: ${DOCREADER_CALLBACK_SECRET:-lab-docreader-secret}
      DOCREADER_SIGNATURE_HEADER: X-Docreader-Signature
      DOCREADER_TIMESTAMP_HEADER: X-Docreader-Timestamp
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-agentic-rag}
      MINIO_SECURE: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/healthz').read()"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - phase4_knowledge_files:/shared/knowledge-files
    ports:
      - "${DOCREADER_HOST_PORT:-39090}:8090"
    depends_on:
      minio:
        condition: service_started

  mock-embedding:
    build:
      context: ${MOCK_EMBEDDING_BUILD_CONTEXT:-../phase2/mock-embedding}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz').read()"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${MOCK_EMBEDDING_HOST_PORT:-38089}:8080"

  app-1:
    build:
      context: ${APP_BUILD_CONTEXT:-../../app/agentic_rag_app}
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-agentic_rag}
      DB_USER: ${POSTGRES_USER:-agentic}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-agentic}
      INGEST_ASYNC_ENABLED: "true"
      INGEST_FILE_STORAGE_BACKEND: minio
      INGEST_FILE_ROOT: /shared/knowledge-files
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-agentic-rag}
      MINIO_SECURE: "false"
      DOCREADER_BASE_URL: http://docreader:8090
      DOCREADER_CALLBACK_BASE_URL: http://nginx:8080
      DOCREADER_CALLBACK_SECRET: ${DOCREADER_CALLBACK_SECRET:-lab-docreader-secret}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-siliconflow}
      RAG_EMBEDDING_SILICONFLOW_BASE_URL: ${RAG_EMBEDDING_SILICONFLOW_BASE_URL:-http://mock-embedding:8080/v1}
      RAG_EMBEDDING_SILICONFLOW_MODEL: ${RAG_EMBEDDING_SILICONFLOW_MODEL:-mock-embedding-16d}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-dummy}
      RAG_POSTGRES_AUTO_INDEX: ${RAG_POSTGRES_AUTO_INDEX:-true}
      SPRING_REDIS_SENTINEL_MASTER: ${SPRING_REDIS_SENTINEL_MASTER:-mymaster}
      SPRING_REDIS_SENTINEL_NODES: ${SPRING_REDIS_SENTINEL_NODES:-redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379}
    volumes:
      - phase4_knowledge_files:/shared/knowledge-files
      - phase4_app_1_data:/app/data
    ports:
      - "${APP_1_HOST_PORT:-38081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
      docreader:
        condition: service_started
      minio:
        condition: service_started
      mock-embedding:
        condition: service_healthy

  app-2:
    build:
      context: ${APP_BUILD_CONTEXT:-../../app/agentic_rag_app}
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-agentic_rag}
      DB_USER: ${POSTGRES_USER:-agentic}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-agentic}
      INGEST_ASYNC_ENABLED: "true"
      INGEST_FILE_STORAGE_BACKEND: minio
      INGEST_FILE_ROOT: /shared/knowledge-files
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-agentic-rag}
      MINIO_SECURE: "false"
      DOCREADER_BASE_URL: http://docreader:8090
      DOCREADER_CALLBACK_BASE_URL: http://nginx:8080
      DOCREADER_CALLBACK_SECRET: ${DOCREADER_CALLBACK_SECRET:-lab-docreader-secret}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-siliconflow}
      RAG_EMBEDDING_SILICONFLOW_BASE_URL: ${RAG_EMBEDDING_SILICONFLOW_BASE_URL:-http://mock-embedding:8080/v1}
      RAG_EMBEDDING_SILICONFLOW_MODEL: ${RAG_EMBEDDING_SILICONFLOW_MODEL:-mock-embedding-16d}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-dummy}
      RAG_POSTGRES_AUTO_INDEX: ${RAG_POSTGRES_AUTO_INDEX:-true}
      SPRING_REDIS_SENTINEL_MASTER: ${SPRING_REDIS_SENTINEL_MASTER:-mymaster}
      SPRING_REDIS_SENTINEL_NODES: ${SPRING_REDIS_SENTINEL_NODES:-redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379}
    volumes:
      - phase4_knowledge_files:/shared/knowledge-files
      - phase4_app_2_data:/app/data
    ports:
      - "${APP_2_HOST_PORT:-38082}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
      docreader:
        condition: service_started
      minio:
        condition: service_started
      mock-embedding:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HOST_PORT:-31080}:8080"
    volumes:
      - ${NGINX_CONFIG_PATH:-../phase3/nginx/nginx.conf}:/etc/nginx/nginx.conf:ro
    depends_on:
      app-1:
        condition: service_started
      app-2:
        condition: service_started

volumes:
  phase4_pg_data:
  phase4_redis_master_data:
  phase4_redis_replica_1_data:
  phase4_minio_data:
  phase4_knowledge_files:
  phase4_app_1_data:
  phase4_app_2_data:
