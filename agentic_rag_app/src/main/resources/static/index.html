<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic RAG Demo</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f8fb; color: #1f2937; }
      .wrap { max-width: 900px; margin: 48px auto; padding: 0 16px; }
      .title { font-size: 28px; margin: 0 0 8px 0; }
      .desc { color: #4b5563; margin: 0 0 24px 0; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; text-decoration: none; color: inherit; }
      .card h2 { margin: 0 0 8px 0; font-size: 20px; }
      .card p { margin: 0; color: #6b7280; line-height: 1.5; }
      .hint { margin-top: 24px; color: #6b7280; font-size: 14px; }
      @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 class="title">Agentic RAG Demo</h1>
      <p class="desc">两个页面：聊天页面、知识库与文档上传页面。</p>

      <div class="grid">
        <a class="card" href="/chat.html">
          <h2>聊天页面</h2>
          <p>经典 LLM Chat 界面。支持 OpenAI / MiniMax，展示流式回复。</p>
        </a>

        <a class="card" href="/knowledge.html">
          <h2>知识库与上传页面</h2>
          <p>区分知识库 ID 与文档上传，显示 job 状态、错误和重试。</p>
        </a>
      </div>

      <p class="hint">默认后端地址为同源（例如 http://localhost:8081）。</p>
    </div>
  </body>
</html>
