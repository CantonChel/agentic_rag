<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>聊天页面</title>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f6f9; color: #111827; }
      .container { max-width: 920px; margin: 0 auto; padding: 16px; }
      .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
      .topbar a { color: #2563eb; text-decoration: none; }
      .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: #4b5563; }
      select, input, button, textarea { font: inherit; }
      select, input { padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 8px; }
      button { padding: 8px 12px; border: 1px solid #2563eb; background: #2563eb; color: #fff; border-radius: 8px; cursor: pointer; }
      button.secondary { background: #fff; color: #2563eb; }
      button:disabled { opacity: 0.55; cursor: not-allowed; }
      .chat-box { margin-top: 12px; border: 1px solid #e5e7eb; border-radius: 12px; height: 480px; overflow-y: auto; background: #f9fafb; padding: 12px; }
      .msg { max-width: 80%; padding: 10px 12px; border-radius: 12px; margin: 8px 0; white-space: pre-wrap; line-height: 1.45; }
      .user { margin-left: auto; background: #2563eb; color: #fff; }
      .assistant { margin-right: auto; background: #fff; border: 1px solid #e5e7eb; }
      .assistant-content { white-space: pre-wrap; }
      .thinking-list { margin-bottom: 8px; }
      .thinking-box { margin-bottom: 8px; padding: 8px 10px; border-radius: 10px; background: #f3f4f6; border: 1px dashed #d1d5db; color: #374151; font-size: 12px; }
      .thinking-title { font-weight: 600; color: #6b7280; margin-bottom: 4px; }
      .thinking-content { white-space: pre-wrap; }
      .input-row { margin-top: 12px; display: flex; gap: 8px; }
      .input-row textarea { flex: 1; min-height: 72px; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; }
      .muted { margin-top: 8px; color: #6b7280; font-size: 12px; }
      .tool-box { margin-top: 10px; padding: 8px; border: 1px dashed #d1d5db; border-radius: 10px; background: #fff; }
      .tool-list { margin: 6px 0 0; padding: 0; list-style: none; }
      .tool-item { padding: 6px 8px; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 6px; background: #f9fafb; font-size: 12px; }
      @media (max-width: 760px) { .chat-box { height: 420px; } .msg { max-width: 92%; } }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <h2 style="margin: 0;">聊天页面</h2>
        <a href="/knowledge.html">去知识库上传页面</a>
      </div>

      <div class="panel">
        <div class="row">
          <label>
            API Base URL
            <input id="apiBase" placeholder="留空表示同源" style="width: 220px;" />
          </label>
          <label>
            Provider
            <select id="provider">
              <option value="openai">openai</option>
              <option value="minimax">minimax</option>
            </select>
          </label>
          <label>
            Mode
            <select id="mode">
              <option value="agent">agent</option>
              <option value="llm">llm</option>
            </select>
          </label>
          <label>
            Tools
            <select id="toolsEnabled">
              <option value="true">开启</option>
              <option value="false">关闭</option>
            </select>
          </label>
          <label>
            User ID
            <input id="userId" placeholder="anonymous" style="width: 180px;" />
          </label>
          <label>
            Session ID
            <input id="sessionId" readonly style="width: 260px;" />
          </label>
          <label>
            历史会话
            <select id="historySession" style="width: 220px;"></select>
          </label>
          <button class="secondary" id="loadSessionBtn">加载会话</button>
          <button class="secondary" id="refreshSessionsBtn">刷新会话</button>
          <button class="secondary" id="newSessionBtn">新建会话</button>
          <button class="secondary" id="clearBtn">清空聊天</button>
          <button class="secondary" id="debugBtn">查看配置</button>
        </div>

        <div id="chatBox" class="chat-box"></div>

        <div class="tool-box" id="toolBox" style="display: none;">
          <div class="row" style="justify-content: space-between;">
            <strong>当前可用工具</strong>
            <div class="row">
              <button class="secondary" id="toggleToolPanelBtn" style="padding: 6px 10px;">展开</button>
              <button class="secondary" id="refreshToolsBtn" style="padding: 6px 10px;">刷新</button>
            </div>
          </div>
          <div id="toolContentWrap" style="display: none;">
            <div class="muted" id="toolHint">仅在 agent + tools 开启时展示</div>
            <ul class="tool-list" id="toolList"></ul>
          </div>
        </div>

        <div class="input-row">
          <textarea id="promptInput" placeholder="输入问题，例如：用两句话解释 RAG"></textarea>
          <button id="sendBtn">发送</button>
        </div>
        <div class="muted">说明：发送后会调用 SSE 接口并按 delta 拼接回复，done 结束。</div>
      </div>
    </div>

    <script>
      const apiBaseInput = document.getElementById('apiBase');
      const providerSel = document.getElementById('provider');
      const modeSel = document.getElementById('mode');
      const toolsSel = document.getElementById('toolsEnabled');
      const userIdInput = document.getElementById('userId');
      const sessionIdInput = document.getElementById('sessionId');
      const historySessionSel = document.getElementById('historySession');
      const loadSessionBtn = document.getElementById('loadSessionBtn');
      const refreshSessionsBtn = document.getElementById('refreshSessionsBtn');
      const newSessionBtn = document.getElementById('newSessionBtn');
      const clearBtn = document.getElementById('clearBtn');
      const chatBox = document.getElementById('chatBox');
      const promptInput = document.getElementById('promptInput');
      const sendBtn = document.getElementById('sendBtn');
      const toolBox = document.getElementById('toolBox');
      const toolList = document.getElementById('toolList');
      const toolHint = document.getElementById('toolHint');
      const refreshToolsBtn = document.getElementById('refreshToolsBtn');
      const toggleToolPanelBtn = document.getElementById('toggleToolPanelBtn');
      const toolContentWrap = document.getElementById('toolContentWrap');
      const debugBtn = document.getElementById('debugBtn');

      let es = null;
      let currentAssistant = null;
      let isStreaming = false;
      let toolsCollapsed = true;

      function apiUrl(path) {
        const base = (apiBaseInput.value || '').trim();
        return base ? base + path : path;
      }

      function newSessionId() {
        return 'web-' + Date.now();
      }

      function currentUserId() {
        return (userIdInput && userIdInput.value ? userIdInput.value : '').trim() || 'anonymous';
      }

      function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = 'msg ' + (role === 'user' ? 'user' : 'assistant');
        let contentEl = div;
        let thinkingContainer = null;
        let thinkingList = null;
        let thinkingTitleEl = null;
        if (role === 'assistant') {
          thinkingTitleEl = document.createElement('div');
          thinkingTitleEl.className = 'thinking-title';
          thinkingTitleEl.textContent = '思考';
          thinkingTitleEl.style.display = 'none';
          div.appendChild(thinkingTitleEl);

          thinkingContainer = document.createElement('div');
          thinkingContainer.className = 'thinking-list';
          div.appendChild(thinkingContainer);

          const content = document.createElement('div');
          content.className = 'assistant-content';
          content.textContent = text || '';
          div.appendChild(content);
          contentEl = content;
        } else {
          div.textContent = text || '';
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return {
          container: div,
          contentEl,
          thinkingContainer,
          thinkingTitleEl,
          currentThinkingEl: null,
          lastEventType: null,
          lastThinkingRoundId: null
        };
      }

      async function createSession() {
        try {
          const query = new URLSearchParams({ userId: currentUserId() });
          const res = await fetch(apiUrl('/api/sessions') + '?' + query.toString(), { method: 'POST' });
          if (!res.ok) throw new Error('create session failed: ' + res.status);
          const data = await res.json();
          sessionIdInput.value = data.sessionId || newSessionId();
          await refreshSessions();
          if (historySessionSel) {
            historySessionSel.value = sessionIdInput.value;
          }
        } catch (_) {
          sessionIdInput.value = newSessionId();
        }
      }

      function stopStream() {
        if (es) {
          es.close();
          es = null;
        }
        setSendingState(false);
      }

      function clearChatBox() {
        chatBox.innerHTML = '';
      }

      function appendThinkingOnly(text) {
        const msg = appendMessage('assistant', '');
        if (!msg) return;
        if (msg.thinkingTitleEl) {
          msg.thinkingTitleEl.style.display = 'block';
        }
        if (msg.thinkingContainer) {
          const box = document.createElement('div');
          box.className = 'thinking-box';
          const boxContent = document.createElement('div');
          boxContent.className = 'thinking-content';
          boxContent.textContent = text || '';
          box.appendChild(boxContent);
          msg.thinkingContainer.appendChild(box);
          msg.currentThinkingEl = boxContent;
          msg.lastEventType = 'thinking';
        }
        if (msg.contentEl) {
          msg.contentEl.textContent = '';
        }
      }

      function appendThinkingToMessage(target, text) {
        if (!target || !text) return;
        if (target.thinkingTitleEl) {
          target.thinkingTitleEl.style.display = 'block';
        }
        if (!target.thinkingContainer) return;
        const box = document.createElement('div');
        box.className = 'thinking-box';
        const boxContent = document.createElement('div');
        boxContent.className = 'thinking-content';
        boxContent.textContent = text || '';
        box.appendChild(boxContent);
        target.thinkingContainer.appendChild(box);
      }

      function setSendingState(sending) {
        isStreaming = !!sending;
        if (sendBtn) {
          sendBtn.disabled = isStreaming;
        }
      }

      function setToolsCollapsed(collapsed) {
        toolsCollapsed = !!collapsed;
        if (toolContentWrap) {
          toolContentWrap.style.display = toolsCollapsed ? 'none' : 'block';
        }
        if (toggleToolPanelBtn) {
          toggleToolPanelBtn.textContent = toolsCollapsed ? '展开' : '折叠';
        }
      }

      async function refreshSessions(autoLoad = true) {
        if (!historySessionSel) return;
        const previous = (historySessionSel.value || sessionIdInput.value || '').trim();
        try {
          const query = new URLSearchParams({ userId: currentUserId() });
          const res = await fetch(apiUrl('/api/sessions') + '?' + query.toString());
          if (!res.ok) throw new Error('list sessions failed: ' + res.status);
          const data = await res.json();
          historySessionSel.innerHTML = '';
          if (Array.isArray(data)) {
            const ids = [];
            for (const item of data) {
              const opt = document.createElement('option');
              opt.value = item.sessionId || item.id || '';
              opt.textContent = opt.value || 'unknown';
              historySessionSel.appendChild(opt);
              if (opt.value) ids.push(opt.value);
            }
            if (ids.length > 0) {
              const selected = ids.includes(previous) ? previous : ids[0];
              historySessionSel.value = selected;
              sessionIdInput.value = selected;
              if (autoLoad) {
                await loadSessionHistoryById(selected);
              }
            } else {
              sessionIdInput.value = '';
              clearChatBox();
            }
          }
        } catch (_) {
          historySessionSel.innerHTML = '';
          sessionIdInput.value = '';
        }
      }

      async function loadSessionHistoryById(sid) {
        if (!sid) return;
        try {
          const query = new URLSearchParams({ userId: currentUserId() });
          const res = await fetch(apiUrl(`/api/sessions/${encodeURIComponent(sid)}/messages`) + '?' + query.toString());
          if (!res.ok) throw new Error('load messages failed: ' + res.status);
          const data = await res.json();
          clearChatBox();
          let lastAssistantMsg = null;
          if (Array.isArray(data)) {
            for (const msg of data) {
              if (!msg || !msg.type) continue;
              if (msg.type === 'USER') {
                appendMessage('user', msg.content || '');
                lastAssistantMsg = null;
              } else if (msg.type === 'ASSISTANT') {
                lastAssistantMsg = appendMessage('assistant', msg.content || '');
              } else if (msg.type === 'THINKING') {
                if (lastAssistantMsg) {
                  appendThinkingToMessage(lastAssistantMsg, msg.content || '');
                } else {
                  appendThinkingOnly(msg.content || '');
                }
              }
            }
          }
          sessionIdInput.value = sid;
        } catch (_) {
          // ignore load errors
        }
      }

      async function loadSessionHistory() {
        const sid = historySessionSel && historySessionSel.value ? historySessionSel.value : '';
        await loadSessionHistoryById(sid);
      }

      function handleThinkingEvent(data) {
        if (!currentAssistant || !currentAssistant.thinkingContainer) return;
        const content = data && data.content ? data.content : '';
        if (!content) return;
        const roundId = data && data.roundId !== undefined && data.roundId !== null ? data.roundId : null;
        if (data && data.source && currentAssistant.thinkingTitleEl) {
          currentAssistant.thinkingTitleEl.textContent = '思考 · ' + data.source;
        }
        if (currentAssistant.thinkingTitleEl) {
          currentAssistant.thinkingTitleEl.style.display = 'block';
        }

        const roundChanged =
          roundId !== null &&
          currentAssistant.lastThinkingRoundId !== undefined &&
          currentAssistant.lastThinkingRoundId !== null &&
          roundId !== currentAssistant.lastThinkingRoundId;
        if (
          currentAssistant.lastEventType !== 'thinking' ||
          !currentAssistant.currentThinkingEl ||
          roundChanged
        ) {
          const box = document.createElement('div');
          box.className = 'thinking-box';
          const boxContent = document.createElement('div');
          boxContent.className = 'thinking-content';
          box.appendChild(boxContent);
          currentAssistant.thinkingContainer.appendChild(box);
          currentAssistant.currentThinkingEl = boxContent;
        }

        currentAssistant.currentThinkingEl.textContent += content;
        if (roundId !== null) {
          currentAssistant.lastThinkingRoundId = roundId;
        }
        currentAssistant.lastEventType = 'thinking';
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function handleDeltaEvent(data) {
        if (data && data.content && currentAssistant && currentAssistant.contentEl) {
          currentAssistant.contentEl.textContent += data.content;
          currentAssistant.lastEventType = 'delta';
          chatBox.scrollTop = chatBox.scrollHeight;
        }
      }

      function handleSseMessage(evt) {
        try {
          const data = JSON.parse(evt.data);
          if (!data || !data.type) return;
          if (data.type === 'thinking') {
            handleThinkingEvent(data);
          } else if (data.type === 'delta') {
            handleDeltaEvent(data);
          }
        } catch (_) {}
      }

      async function refreshTools() {
        const mode = modeSel.value;
        const toolsEnabled = toolsSel.value === 'true';
        if (mode !== 'agent' || !toolsEnabled) {
          toolBox.style.display = 'none';
          toolList.innerHTML = '';
          toolHint.textContent = '仅在 agent + tools 开启时展示';
          return;
        }
        toolBox.style.display = 'block';
        setToolsCollapsed(true);
        toolHint.textContent = '加载中...';
        toolList.innerHTML = '';
        try {
          const res = await fetch(apiUrl('/api/tools'));
          const data = await res.json();
          if (!Array.isArray(data) || data.length === 0) {
            toolHint.textContent = '当前没有可用工具';
            return;
          }
          toolHint.textContent = '已加载 ' + data.length + ' 个工具';
          for (const tool of data) {
            const li = document.createElement('li');
            li.className = 'tool-item';
            const name = tool.name || tool.getName || 'unknown';
            const desc = tool.description || '';
            li.textContent = name + (desc ? ' - ' + desc : '');
            toolList.appendChild(li);
          }
        } catch (e) {
          toolHint.textContent = '工具加载失败';
        }
      }

      function send() {
        if (isStreaming) return;
        const prompt = (promptInput.value || '').trim();
        if (!prompt) return;

        stopStream();
        appendMessage('user', prompt);
        currentAssistant = appendMessage('assistant', '');
        setSendingState(true);
        promptInput.value = '';

        const provider = providerSel.value;
        const mode = modeSel.value;
        const sessionId = sessionIdInput.value || newSessionId();
        const userId = currentUserId();
        sessionIdInput.value = sessionId;
        const toolsEnabled = toolsSel.value === 'true';

        const basePath = mode === 'agent' ? '/api/agent/' : '/api/llm/';
        const path = basePath + provider + '/stream';
        const query = new URLSearchParams({ userId, sessionId, prompt, tools: String(toolsEnabled) });
        const url = apiUrl(path) + '?' + query.toString();

        es = new EventSource(url);

        es.addEventListener('delta', (evt) => {
          handleSseMessage(evt);
        });

        es.addEventListener('thinking', (evt) => {
          handleSseMessage(evt);
        });

        es.addEventListener('message', (evt) => {
          handleSseMessage(evt);
        });

        es.addEventListener('done', () => {
          stopStream();
        });

        es.addEventListener('error', (evt) => {
          try {
            const data = JSON.parse(evt.data);
            const msg = data && data.content ? data.content : 'stream error';
            if (currentAssistant && currentAssistant.contentEl) {
              currentAssistant.contentEl.textContent += '\n[error] ' + msg;
            }
          } catch (_) {
            if (currentAssistant && currentAssistant.contentEl) {
              currentAssistant.contentEl.textContent += '\n[error] stream closed';
            }
          }
          stopStream();
        });
      }

      newSessionBtn.addEventListener('click', createSession);
      clearBtn.addEventListener('click', () => { chatBox.innerHTML = ''; });
      refreshSessionsBtn.addEventListener('click', refreshSessions);
      loadSessionBtn.addEventListener('click', loadSessionHistory);
      historySessionSel.addEventListener('change', loadSessionHistory);
      sendBtn.addEventListener('click', send);
      refreshToolsBtn.addEventListener('click', refreshTools);
      toggleToolPanelBtn.addEventListener('click', () => {
        setToolsCollapsed(!toolsCollapsed);
      });
      modeSel.addEventListener('change', () => {
        if (modeSel.value === 'agent') {
          providerSel.value = 'minimax';
        }
        refreshTools();
      });
      toolsSel.addEventListener('change', refreshTools);
      debugBtn.addEventListener('click', () => {
        const url = apiUrl('/api/debug/llm');
        window.open(url, '_blank');
      });
      promptInput.addEventListener('keydown', (e) => {
        if (e.isComposing) return;
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });
      userIdInput.addEventListener('change', async () => {
        stopStream();
        clearChatBox();
        sessionIdInput.value = '';
        await refreshSessions(true);
      });
      userIdInput.value = 'anonymous';
      setSendingState(false);
      setToolsCollapsed(true);
      if (modeSel.value === 'agent') {
        providerSel.value = 'minimax';
      }

      refreshSessions(true);
      refreshTools();
    </script>
  </body>
</html>
