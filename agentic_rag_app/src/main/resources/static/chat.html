<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 智能助手</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        color: #1f2937;
        overflow: hidden;
      }

      .app-container {
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        padding: 16px 24px;
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
      }

      .header-content {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 24px;
        font-weight: bold;
      }

      .logo-text h1 {
        font-size: 20px;
        font-weight: 600;
        color: #1f2937;
      }

      .logo-text p {
        font-size: 12px;
        color: #6b7280;
      }

      .nav-links {
        display: flex;
        gap: 16px;
        align-items: center;
      }

      .nav-link {
        padding: 8px 16px;
        background: white;
        color: #667eea;
        text-decoration: none;
        border-radius: 8px;
        border: 1px solid #667eea;
        transition: all 0.3s ease;
        font-weight: 500;
      }

      .nav-link:hover {
        background: #667eea;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      .main-content {
        flex: 1;
        display: flex;
        overflow: hidden;
        max-width: 1400px;
        width: 100%;
        margin: 0 auto;
      }

      .sidebar {
        width: 320px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-right: 1px solid rgba(255, 255, 255, 0.2);
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .config-section {
        background: white;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      .config-section h3 {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .config-section h3::before {
        content: '';
        width: 4px;
        height: 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 2px;
      }

      .form-group {
        margin-bottom: 12px;
      }

      .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: #6b7280;
        margin-bottom: 6px;
      }

      .form-control {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        font-size: 13px;
        transition: all 0.3s ease;
        background: #f9fafb;
      }

      .form-control:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      select.form-control {
        cursor: pointer;
      }

      .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      .btn-secondary {
        background: white;
        color: #667eea;
        border: 1px solid #e5e7eb;
      }

      .btn-secondary:hover {
        background: #f9fafb;
        border-color: #667eea;
      }

      .btn-danger {
        background: #ef4444;
        color: white;
      }

      .btn-danger:hover {
        background: #dc2626;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
      }

      .btn-group {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chat-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
      }

      .chat-header {
        padding: 16px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        background: white;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      .session-info {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
        color: #6b7280;
      }

      .session-badge {
        padding: 4px 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 500;
      }

      .messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .message {
        max-width: 80%;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        align-self: flex-end;
      }

      .message.assistant {
        align-self: flex-start;
      }

      .message-content {
        padding: 12px 16px;
        border-radius: 16px;
        line-height: 1.6;
        position: relative;
      }

      .message.user .message-content {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-bottom-right-radius: 4px;
      }

      .message.assistant .message-content {
        background: white;
        color: #1f2937;
        border: 1px solid #e5e7eb;
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      .event-timeline {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin: 10px 0 12px;
      }

      .thinking-title {
        font-size: 12px;
        font-weight: 600;
        color: #667eea;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .thinking-title::before {
        content: '💭';
      }

      .thinking-block {
        padding: 12px;
        background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        border-radius: 12px;
        border-left: 4px solid #667eea;
      }

      .thinking-content {
        font-size: 13px;
        color: #4b5563;
        white-space: pre-wrap;
        line-height: 1.5;
      }

      .thinking-block + .thinking-block {
        margin-top: 10px;
      }

      .thinking-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 6px;
      }

      .thinking-round {
        font-size: 11px;
        font-weight: 600;
        color: #334155;
        flex-shrink: 0;
      }

      .thinking-source-meta {
        margin-bottom: 6px;
        font-size: 11px;
        color: #64748b;
      }

      .assistant-content {
        white-space: pre-wrap;
      }

      .turn-meta {
        margin: 8px 0 10px;
        font-size: 12px;
        color: #6b7280;
      }

      .tool-title {
        font-size: 12px;
        font-weight: 600;
        color: #334155;
      }

      .tool-card {
        border: 1px solid #dbeafe;
        border-radius: 10px;
        background: #ffffff;
        overflow: hidden;
      }

      .tool-card[data-status="running"] {
        border-left: 4px solid #2563eb;
      }

      .tool-card[data-status="success"] {
        border-left: 4px solid #059669;
      }

      .tool-card[data-status="error"],
      .tool-card[data-status="timeout"] {
        border-left: 4px solid #dc2626;
      }

      .tool-summary {
        cursor: pointer;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 600;
        color: #1f2937;
        list-style: none;
      }

      .tool-summary::-webkit-details-marker {
        display: none;
      }

      .tool-body {
        border-top: 1px solid #e5e7eb;
        padding: 8px 12px 12px;
        font-size: 12px;
        color: #374151;
      }

      .tool-body pre {
        margin: 6px 0 0;
        padding: 8px;
        border-radius: 8px;
        background: #f3f4f6;
        color: #111827;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .todo-plan {
        margin-top: 8px;
        padding: 10px;
        border-radius: 8px;
        background: #eef2ff;
        border: 1px solid #c7d2fe;
      }

      .todo-plan-title {
        font-size: 12px;
        font-weight: 700;
        color: #312e81;
        margin-bottom: 6px;
      }

      .todo-plan-task {
        font-size: 12px;
        color: #3730a3;
        margin-bottom: 6px;
      }

      .todo-plan-step {
        font-size: 12px;
        color: #1e1b4b;
        line-height: 1.5;
      }

      .input-area {
        padding: 20px 24px;
        background: white;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.05);
      }

      .input-wrapper {
        display: flex;
        gap: 12px;
        align-items: flex-end;
      }

      .input-field {
        flex: 1;
        position: relative;
      }

      .input-field textarea {
        width: 100%;
        min-height: 60px;
        max-height: 200px;
        padding: 12px 16px;
        border: 2px solid #e5e7eb;
        border-radius: 12px;
        font-size: 14px;
        resize: vertical;
        transition: all 0.3s ease;
        font-family: inherit;
      }

      .input-field textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .send-btn {
        padding: 12px 24px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .send-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
      }

      .send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
      }

      .send-btn::before {
        content: '➤';
      }

      .tools-panel {
        margin-top: 16px;
        padding: 16px;
        background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
        border-radius: 12px;
        border: 1px solid #e5e7eb;
      }

      .tools-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .tools-title {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
      }

      .tool-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .tool-item {
        padding: 8px 12px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        font-size: 12px;
        color: #4b5563;
      }

      .memory-panel {
        margin-top: 16px;
        padding: 16px;
        background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
        border-radius: 12px;
        border: 1px solid #e5e7eb;
      }

      .memory-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .memory-title {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
      }

      .memory-content {
        margin-top: 12px;
        padding: 12px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        min-height: 120px;
        max-height: 280px;
        overflow-y: auto;
        white-space: pre-wrap;
        line-height: 1.5;
        font-size: 13px;
        color: #4b5563;
      }

      .empty-state {
        text-align: center;
        padding: 48px 24px;
        color: #9ca3af;
      }

      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 16px;
      }

      .empty-state-text {
        font-size: 14px;
      }

      .scrollbar-thin::-webkit-scrollbar {
        width: 6px;
      }

      .scrollbar-thin::-webkit-scrollbar-track {
        background: #f3f4f6;
        border-radius: 3px;
      }

      .scrollbar-thin::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 3px;
      }

      .scrollbar-thin::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }

      @media (max-width: 1024px) {
        .sidebar {
          width: 280px;
        }
      }

      @media (max-width: 768px) {
        .main-content {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          max-height: 40vh;
          order: 2;
        }

        .chat-area {
          order: 1;
        }

        .message {
          max-width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <div class="header-content">
          <div class="logo">
            <div class="logo-icon">AI</div>
            <div class="logo-text">
              <h1>AI 智能助手</h1>
              <p>基于 RAG 的智能对话系统</p>
            </div>
          </div>
          <nav class="nav-links">
            <a href="/knowledge.html" class="nav-link">📚 知识库管理</a>
            <a href="/index.html" class="nav-link">🏠 首页</a>
          </nav>
        </div>
      </header>

      <div class="main-content">
        <aside class="sidebar scrollbar-thin">
          <div class="config-section">
            <h3>会话管理</h3>
            <div class="form-group">
              <label>历史会话</label>
              <select id="historySession" class="form-control"></select>
            </div>
            <div class="btn-group">
              <button class="btn btn-primary" id="newSessionBtn">新建会话</button>
              <button class="btn btn-secondary" id="loadSessionBtn">加载</button>
              <button class="btn btn-secondary" id="refreshSessionsBtn">刷新</button>
            </div>
            <div class="form-group" style="margin-top: 12px;">
              <label>当前会话 ID</label>
              <input type="text" id="sessionId" class="form-control" readonly />
            </div>
            <div class="form-group">
              <label>用户 ID</label>
              <input type="text" id="userId" class="form-control" placeholder="anonymous" />
            </div>
          </div>

          <div class="config-section">
            <h3>模型配置</h3>
            <div class="form-group">
              <label>API Base URL</label>
              <input type="text" id="apiBase" class="form-control" placeholder="留空表示同源" />
            </div>
            <div class="form-group">
              <label>提供商 (Provider)</label>
              <select id="provider" class="form-control">
                <option value="minimax" selected>MiniMax</option>
                <option value="openai">OpenAI</option>
              </select>
            </div>
            <div class="form-group">
              <label>模式 (Mode)</label>
              <select id="mode" class="form-control">
                <option value="agent">Agent (智能代理)</option>
                <option value="llm">LLM (直接对话)</option>
              </select>
            </div>
            <div class="form-group">
              <label>工具调用</label>
              <select id="toolsEnabled" class="form-control">
                <option value="true">开启</option>
                <option value="false">关闭</option>
              </select>
            </div>
          </div>

          <div class="config-section">
            <h3>记忆文档</h3>
            <div class="form-group">
              <label>选择记忆文件</label>
              <select id="memoryFileSelect" class="form-control"></select>
            </div>
            <div class="btn-group">
              <button class="btn btn-secondary" id="refreshMemoryBtn">刷新</button>
              <button class="btn btn-primary" id="openMemoryBtn">打开</button>
            </div>
            <div id="memoryMeta" style="margin-top: 8px; font-size: 12px; color: #6b7280;">暂无记忆文档</div>
            <div id="memoryContent" class="memory-content scrollbar-thin"></div>
          </div>

          <div class="config-section">
            <h3>操作</h3>
            <div class="btn-group">
              <button class="btn btn-danger" id="clearBtn">清空聊天</button>
              <button class="btn btn-secondary" id="debugBtn">查看配置</button>
            </div>
          </div>
        </aside>

        <main class="chat-area">
          <div class="chat-header">
            <div class="session-info">
              <span class="session-badge" id="sessionBadge">新会话</span>
              <span id="sessionStatus">准备就绪</span>
            </div>
          </div>

          <div id="chatBox" class="messages-container scrollbar-thin">
            <div class="empty-state">
              <div class="empty-state-icon">💬</div>
              <div class="empty-state-text">开始一段新的对话吧！</div>
            </div>
          </div>

          <div class="input-area">
            <div class="input-wrapper">
              <div class="input-field">
                <textarea id="promptInput" placeholder="输入您的问题，例如：用两句话解释 RAG"></textarea>
              </div>
              <button class="send-btn" id="sendBtn">发送</button>
            </div>
            <div style="margin-top: 8px; font-size: 12px; color: #9ca3af;">
              提示：发送后会调用 SSE 接口并按 delta 拼接回复，done 结束。
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      const apiBaseInput = document.getElementById('apiBase');
      const providerSel = document.getElementById('provider');
      const modeSel = document.getElementById('mode');
      const toolsSel = document.getElementById('toolsEnabled');
      const userIdInput = document.getElementById('userId');
      const sessionIdInput = document.getElementById('sessionId');
      const historySessionSel = document.getElementById('historySession');
      const loadSessionBtn = document.getElementById('loadSessionBtn');
      const refreshSessionsBtn = document.getElementById('refreshSessionsBtn');
      const newSessionBtn = document.getElementById('newSessionBtn');
      const clearBtn = document.getElementById('clearBtn');
      const chatBox = document.getElementById('chatBox');
      const promptInput = document.getElementById('promptInput');
      const sendBtn = document.getElementById('sendBtn');
      const debugBtn = document.getElementById('debugBtn');
      const refreshMemoryBtn = document.getElementById('refreshMemoryBtn');
      const openMemoryBtn = document.getElementById('openMemoryBtn');
      const memoryFileSelect = document.getElementById('memoryFileSelect');
      const memoryMeta = document.getElementById('memoryMeta');
      const memoryContent = document.getElementById('memoryContent');
      const sessionBadge = document.getElementById('sessionBadge');
      const sessionStatus = document.getElementById('sessionStatus');

      let es = null;
      let currentAssistant = null;
      let isStreaming = false;
      let streamDone = false;
      let currentAbortController = null;
      let activeStreamId = 0;

      function apiUrl(path) {
        const base = (apiBaseInput.value || '').trim();
        return base ? base + path : path;
      }

      function newSessionId() {
        return 'web-' + Date.now();
      }

      function currentUserId() {
        return (userIdInput && userIdInput.value ? userIdInput.value : '').trim() || 'anonymous';
      }

      function formatBytes(n) {
        const v = Number(n || 0);
        if (!Number.isFinite(v) || v <= 0) return '0 B';
        if (v < 1024) return v + ' B';
        if (v < 1024 * 1024) return (v / 1024).toFixed(1) + ' KB';
        return (v / (1024 * 1024)).toFixed(1) + ' MB';
      }

      function formatTime(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return d.toLocaleString();
      }

      function updateSessionStatus(status) {
        if (sessionStatus) {
          sessionStatus.textContent = status;
        }
      }

      function setCurrentSessionSelection(sessionId) {
        const sid = (sessionId || '').trim();
        if (sessionIdInput) {
          sessionIdInput.value = sid;
        }
        if (historySessionSel) {
          historySessionSel.value = sid;
        }
        if (sessionBadge) {
          sessionBadge.textContent = sid ? ('会话: ' + sid.substring(0, 12) + '...') : '新会话';
        }
      }

      function clearEmptyState() {
        const emptyState = chatBox.querySelector('.empty-state');
        if (emptyState) {
          emptyState.remove();
        }
      }

      function appendMessage(role, text) {
        clearEmptyState();
        
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message ' + (role === 'user' ? 'user' : 'assistant');
        
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        
        let eventTimelineEl = null;
        let thinkingContainer = null;
        let thinkingTitleEl = null;
        let assistantContentEl = null;
        let turnMetaEl = null;
        let toolTitleEl = null;
        let toolContainer = null;

        if (role === 'assistant') {
          turnMetaEl = document.createElement('div');
          turnMetaEl.className = 'turn-meta';
          turnMetaEl.style.display = 'none';
          contentDiv.appendChild(turnMetaEl);

          eventTimelineEl = document.createElement('div');
          eventTimelineEl.className = 'event-timeline';
          eventTimelineEl.style.display = 'none';
          contentDiv.appendChild(eventTimelineEl);

          thinkingContainer = eventTimelineEl;
          toolContainer = eventTimelineEl;

          assistantContentEl = document.createElement('div');
          assistantContentEl.className = 'assistant-content';
          assistantContentEl.textContent = text || '';
          contentDiv.appendChild(assistantContentEl);
        } else {
          contentDiv.textContent = text || '';
        }

        messageDiv.appendChild(contentDiv);
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        
        return {
          container: messageDiv,
          contentEl: assistantContentEl || contentDiv,
          eventTimelineEl,
          thinkingContainer,
          thinkingTitleEl,
          turnMetaEl,
          toolTitleEl,
          toolContainer,
          toolCardsById: {},
          turnId: null,
          lastSequenceId: null,
          currentThinkingWrapper: null,
          currentThinkingEl: null,
          currentThinkingTitleEl: null,
          currentThinkingSourceMetaEl: null,
          currentThinkingSources: [],
          currentThinkingBlockKey: null,
          lastEventType: null,
          lastThinkingRoundId: null
        };
      }

      async function createSession(options = {}) {
        const stopCurrentStream = options.stopCurrentStream !== false;
        if (stopCurrentStream && isStreaming) {
          stopStream('已停止当前输出，正在创建新会话...');
        }
        clearChatBox();
        try {
          updateSessionStatus('创建会话中...');
          const query = new URLSearchParams({ userId: currentUserId() });
          const res = await fetch(apiUrl('/api/sessions') + '?' + query.toString(), { method: 'POST' });
          if (!res.ok) throw new Error('create session failed: ' + res.status);
          const data = await res.json();
          const createdSessionId = data.sessionId || newSessionId();
          setCurrentSessionSelection(createdSessionId);
          await refreshSessions(false, createdSessionId);
          clearChatBox();
          updateSessionStatus('会话已创建并已切换');
        } catch (_) {
          setCurrentSessionSelection(newSessionId());
          clearChatBox();
          updateSessionStatus('会话创建失败，使用本地ID');
        }
      }

      function stopStream(statusMessage) {
        activeStreamId += 1;
        if (currentAbortController) {
          currentAbortController.abort();
          currentAbortController = null;
        }
        if (es) {
          es.close();
          es = null;
        }
        setSendingState(false);
        if (statusMessage) {
          updateSessionStatus(statusMessage);
        }
      }

      function clearChatBox() {
        currentAssistant = null;
        chatBox.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><div class="empty-state-text">开始一段新的对话吧！</div></div>';
      }

      function appendThinkingOnly(text) {
        const msg = appendMessage('assistant', '');
        if (!msg) return;
        appendThinkingToMessage(msg, text);
        if (msg.contentEl) {
          msg.contentEl.textContent = '';
        }
      }

      function appendThinkingToMessage(target, text) {
        if (!target || !text) return;
        if (!target.thinkingContainer) return;
        target.thinkingContainer.style.display = 'block';
        const wrapper = document.createElement('div');
        wrapper.className = 'thinking-block';
        const head = document.createElement('div');
        head.className = 'thinking-head';
        const title = document.createElement('div');
        title.className = 'thinking-title';
        title.textContent = '思考';
        head.appendChild(title);
        wrapper.appendChild(head);
        const box = document.createElement('div');
        box.className = 'thinking-content';
        box.textContent = text || '';
        wrapper.appendChild(box);
        target.thinkingContainer.appendChild(wrapper);
        target.currentThinkingEl = box;
        target.currentThinkingBlockKey = 'history';
        target.lastEventType = 'thinking';
      }

      function setSendingState(sending) {
        isStreaming = !!sending;
        if (sendBtn) {
          sendBtn.disabled = isStreaming;
        }
        if (isStreaming) {
          updateSessionStatus('AI 正在思考...');
        } else {
          updateSessionStatus('准备就绪');
        }
      }

      async function refreshSessions(autoLoad = true, preferredSessionId = '') {
        if (!historySessionSel) return;
        const previous = (preferredSessionId || historySessionSel.value || sessionIdInput.value || '').trim();
        try {
          const query = new URLSearchParams({ userId: currentUserId() });
          const res = await fetch(apiUrl('/api/sessions') + '?' + query.toString());
          if (!res.ok) throw new Error('list sessions failed: ' + res.status);
          const data = await res.json();
          historySessionSel.innerHTML = '';
          if (Array.isArray(data)) {
            const ids = [];
            for (const item of data) {
              const opt = document.createElement('option');
              opt.value = item.sessionId || item.id || '';
              opt.textContent = opt.value || 'unknown';
              historySessionSel.appendChild(opt);
              if (opt.value) ids.push(opt.value);
            }
            if (ids.length > 0) {
              const selected = ids.includes(previous) ? previous : ids[0];
              setCurrentSessionSelection(selected);
              if (autoLoad) {
                await loadSessionHistoryById(selected);
              }
            } else {
              setCurrentSessionSelection('');
              clearChatBox();
            }
          }
        } catch (_) {
          historySessionSel.innerHTML = '';
          setCurrentSessionSelection('');
        }
      }

      async function refreshMemoryFiles(autoOpen = false) {
        if (!memoryFileSelect || !memoryMeta || !memoryContent) return;
        memoryMeta.textContent = '正在加载记忆文件...';
        memoryContent.textContent = '';
        memoryFileSelect.innerHTML = '';
        try {
          const query = new URLSearchParams({ userId: currentUserId(), includeGlobal: 'true' });
          const res = await fetch(apiUrl('/api/memory/files') + '?' + query.toString());
          if (!res.ok) throw new Error('list memory files failed: ' + res.status);
          const data = await res.json();
          if (!Array.isArray(data) || data.length === 0) {
            memoryMeta.textContent = '暂无记忆文档';
            return;
          }
          for (const file of data) {
            const opt = document.createElement('option');
            opt.value = file.id || '';
            const kind = file.kind || 'memory';
            opt.textContent = (file.path || file.id || 'unknown') + ' [' + kind + ']';
            memoryFileSelect.appendChild(opt);
          }
          memoryMeta.textContent = '已加载 ' + data.length + ' 个记忆文档';
          if (autoOpen) {
            await openMemoryFile();
          }
        } catch (_) {
          memoryMeta.textContent = '记忆文件加载失败';
        }
      }

      async function openMemoryFile() {
        if (!memoryFileSelect || !memoryMeta || !memoryContent) return;
        const id = (memoryFileSelect.value || '').trim();
        if (!id) {
          memoryMeta.textContent = '请先选择一个记忆文档';
          return;
        }
        memoryMeta.textContent = '正在读取文档...';
        memoryContent.textContent = '';
        try {
          const query = new URLSearchParams({ userId: currentUserId(), id });
          const res = await fetch(apiUrl('/api/memory/file') + '?' + query.toString());
          if (!res.ok) throw new Error('open memory file failed: ' + res.status);
          const data = await res.json();
          memoryContent.textContent = data.content || '';
          memoryMeta.textContent =
            (data.path || id) +
            ' · ' +
            (data.kind || 'memory') +
            ' · ' +
            formatBytes(data.size) +
            ' · ' +
            formatTime(data.updatedAt);
        } catch (_) {
          memoryMeta.textContent = '读取记忆文档失败';
        }
      }

      async function loadSessionHistoryById(sid) {
        if (!sid) return;
        try {
          setCurrentSessionSelection(sid);
          const query = new URLSearchParams({ userId: currentUserId() });
          const res = await fetch(apiUrl(`/api/sessions/${encodeURIComponent(sid)}/messages`) + '?' + query.toString());
          if (!res.ok) throw new Error('load messages failed: ' + res.status);
          const data = await res.json();
          clearChatBox();
          let lastAssistantMsg = null;
          if (Array.isArray(data)) {
            for (const msg of data) {
              if (!msg || !msg.type) continue;
              if (msg.type === 'USER') {
                appendMessage('user', msg.content || '');
                lastAssistantMsg = null;
              } else if (msg.type === 'ASSISTANT') {
                lastAssistantMsg = appendMessage('assistant', msg.content || '');
              } else if (msg.type === 'THINKING') {
                if (lastAssistantMsg) {
                  appendThinkingToMessage(lastAssistantMsg, msg.content || '');
                } else {
                  appendThinkingOnly(msg.content || '');
                }
              } else if (msg.type === 'TOOL_CALL' && lastAssistantMsg && Array.isArray(msg.toolCalls)) {
                withAssistantTarget(lastAssistantMsg, () => {
                  for (const call of msg.toolCalls) {
                    handleToolStartEvent({
                      toolCallId: call && call.id ? call.id : undefined,
                      toolName: call && call.name ? call.name : undefined,
                      argsPreview: call && call.arguments ? call.arguments : undefined
                    });
                  }
                });
              } else if (msg.type === 'TOOL_RESULT' && lastAssistantMsg) {
                withAssistantTarget(lastAssistantMsg, () => {
                  handleToolEndEvent({
                    toolCallId: msg.toolCallId || undefined,
                    toolName: msg.toolName || undefined,
                    status: msg.success ? 'success' : 'error',
                    resultPreview: msg.result ? { text: msg.result } : undefined,
                    error: msg.success ? undefined : (msg.result || 'tool failed')
                  });
                });
              }
            }
          }
          setCurrentSessionSelection(sid);
          updateSessionStatus('历史会话已加载');
        } catch (_) {
          // ignore load errors
        }
      }

      async function loadSessionHistory() {
        const sid = historySessionSel && historySessionSel.value ? historySessionSel.value : '';
        if (isStreaming) {
          stopStream('已停止当前输出，正在切换会话...');
        }
        await loadSessionHistoryById(sid);
      }

      function withAssistantTarget(target, fn) {
        const previous = currentAssistant;
        currentAssistant = target;
        try {
          fn();
        } finally {
          currentAssistant = previous;
        }
      }

      function formatPreview(payload) {
        if (payload === undefined || payload === null) return '';
        if (typeof payload === 'string') return payload;
        try {
          return JSON.stringify(payload, null, 2);
        } catch (_) {
          return String(payload);
        }
      }

      function resolveToolCallId(data) {
        if (!data) return 'tool-' + Date.now();
        if (data.toolCallId) return String(data.toolCallId);
        return (data.toolName || 'tool') + '-' + Date.now();
      }

      function normalizeTodoStatus(status) {
        const value = String(status || 'pending').toLowerCase();
        if (value === 'done' || value === 'completed' || value === 'success') return 'done';
        if (value === 'running' || value === 'doing') return 'running';
        return 'pending';
      }

      function extractTodoFromResultPreview(resultPreview) {
        const text =
          typeof resultPreview === 'string'
            ? resultPreview
            : (resultPreview && typeof resultPreview.text === 'string' ? resultPreview.text : '');
        if (!text) return null;
        const lines = text.split('\n');
        let task = '';
        const steps = [];
        for (const line of lines) {
          if (line.startsWith('任务:')) {
            task = line.slice(3).trim();
            continue;
          }
          const m = line.match(/^\s*\d+\.\s+\[([^\]]+)\]\s+(.+)\s+\(([^)]+)\)\s*$/);
          if (!m) continue;
          steps.push({ id: m[1], description: m[2], status: m[3] });
        }
        if (!task && steps.length === 0) return null;
        return { task, steps };
      }

      function extractTodoPlan(argsPreview, resultPreview) {
        if (argsPreview && typeof argsPreview === 'object' && argsPreview.task && Array.isArray(argsPreview.steps)) {
          return {
            task: String(argsPreview.task || ''),
            steps: argsPreview.steps.map((step, idx) => ({
              id: step && step.id ? String(step.id) : 'step' + (idx + 1),
              description: step && step.description ? String(step.description) : '',
              status: step && step.status ? String(step.status) : 'pending'
            }))
          };
        }
        return extractTodoFromResultPreview(resultPreview);
      }

      function renderTodoPlan(card, argsPreview, resultPreview) {
        if (!card || !card.todoPlanEl) return;
        const plan = extractTodoPlan(argsPreview, resultPreview);
        if (!plan) return;
        card.todoPlanEl.innerHTML = '';
        card.todoPlanEl.style.display = 'block';

        const title = document.createElement('div');
        title.className = 'todo-plan-title';
        title.textContent = 'Todo 计划';
        card.todoPlanEl.appendChild(title);

        const task = document.createElement('div');
        task.className = 'todo-plan-task';
        task.textContent = '任务：' + (plan.task || '(未提供)');
        card.todoPlanEl.appendChild(task);

        for (const step of plan.steps || []) {
          const row = document.createElement('div');
          row.className = 'todo-plan-step';
          const status = normalizeTodoStatus(step.status);
          const flag = status === 'done' ? '✅' : (status === 'running' ? '⏳' : '⬜');
          row.textContent = `${flag} [${step.id}] ${step.description}`;
          card.todoPlanEl.appendChild(row);
        }
      }

      const THINKING_SOURCE_LABELS = {
        thinking_tool: '计划思考',
        reasoning_details: '模型推理中',
        reasoning_field: '推理片段',
        assistant_content: '内容解析思考'
      };

      function getThinkingSourceLabel(source) {
        const normalized = source ? String(source).trim() : '';
        if (!normalized) return '思考';
        return THINKING_SOURCE_LABELS[normalized] || '思考';
      }

      function updateThinkingSourceSummary(target, source) {
        if (!target || !target.currentThinkingWrapper) return;
        const normalized = source ? String(source).trim() : '';
        const sourceList = Array.isArray(target.currentThinkingSources) ? target.currentThinkingSources : [];
        if (normalized && !sourceList.includes(normalized)) {
          sourceList.push(normalized);
        }
        target.currentThinkingSources = sourceList;

        const labels = [];
        for (const item of sourceList) {
          const label = getThinkingSourceLabel(item);
          if (label && !labels.includes(label)) {
            labels.push(label);
          }
        }

        if (target.currentThinkingTitleEl) {
          target.currentThinkingTitleEl.textContent = labels.length > 1 ? '思考进行中' : (labels[0] || '思考');
        }
        if (target.currentThinkingSourceMetaEl) {
          const summary = labels.length > 0 ? '来源: ' + labels.join(' / ') : '';
          target.currentThinkingSourceMetaEl.textContent = summary;
          target.currentThinkingSourceMetaEl.style.display = summary ? 'block' : 'none';
        }
        target.currentThinkingWrapper.dataset.sources = sourceList.join(',');
        target.currentThinkingWrapper.title = sourceList.length > 0
          ? 'thinking source: ' + sourceList.join(', ')
          : '';
      }

      function closeCurrentThinkingBlock(target, nextEventType) {
        if (!target) return;
        target.currentThinkingWrapper = null;
        target.currentThinkingEl = null;
        target.currentThinkingTitleEl = null;
        target.currentThinkingSourceMetaEl = null;
        target.currentThinkingSources = [];
        target.currentThinkingBlockKey = null;
        if (nextEventType) {
          target.lastEventType = nextEventType;
        }
      }

      function ensureToolCard(target, data) {
        if (!target || !target.toolContainer) return null;
        const toolCallId = resolveToolCallId(data);
        let card = target.toolCardsById[toolCallId];
        if (card) return card;

        target.toolContainer.style.display = 'block';

        const details = document.createElement('details');
        details.className = 'tool-card';
        details.dataset.status = 'running';

        const summary = document.createElement('summary');
        summary.className = 'tool-summary';
        summary.textContent = '工具执行中：' + (data.toolName || 'unknown');
        details.appendChild(summary);

        const body = document.createElement('div');
        body.className = 'tool-body';
        details.appendChild(body);

        const metaEl = document.createElement('div');
        body.appendChild(metaEl);

        const argsPre = document.createElement('pre');
        argsPre.style.display = 'none';
        body.appendChild(argsPre);

        const resultPre = document.createElement('pre');
        resultPre.style.display = 'none';
        body.appendChild(resultPre);

        const todoPlanEl = document.createElement('div');
        todoPlanEl.className = 'todo-plan';
        todoPlanEl.style.display = 'none';
        body.appendChild(todoPlanEl);

        target.toolContainer.appendChild(details);
        card = { details, summary, metaEl, argsPre, resultPre, todoPlanEl, toolCallId };
        target.toolCardsById[toolCallId] = card;
        return card;
      }

      function handleTurnStartEvent(data) {
        if (!currentAssistant) return;
        closeCurrentThinkingBlock(currentAssistant, 'turn');
        if (data && data.turnId) {
          currentAssistant.turnId = data.turnId;
        }
        if (currentAssistant.turnMetaEl) {
          currentAssistant.turnMetaEl.style.display = 'block';
          currentAssistant.turnMetaEl.textContent =
            '回合开始 · turnId=' + (currentAssistant.turnId || '-') +
            (data && data.sequenceId !== undefined ? ' · seq=' + data.sequenceId : '');
        }
      }

      function handleTurnEndEvent(data) {
        if (!currentAssistant || !currentAssistant.turnMetaEl) return;
        closeCurrentThinkingBlock(currentAssistant, 'turn');
        const reason = data && data.finishReason ? data.finishReason : 'done';
        currentAssistant.turnMetaEl.style.display = 'block';
        currentAssistant.turnMetaEl.textContent =
          '回合结束 · reason=' + reason +
          (data && data.sequenceId !== undefined ? ' · seq=' + data.sequenceId : '');
      }

      function handleToolStartEvent(data) {
        if (!currentAssistant) return;
        closeCurrentThinkingBlock(currentAssistant, 'tool');
        const card = ensureToolCard(currentAssistant, data);
        if (!card) return;
        card.details.dataset.status = 'running';
        card.summary.textContent = '工具执行中：' + (data.toolName || 'unknown');
        card.metaEl.textContent =
          '状态: running' +
          (data.roundId !== undefined && data.roundId !== null ? ' · round=' + data.roundId : '');
        const argsText = formatPreview(data.argsPreview);
        if (argsText) {
          card.argsPre.style.display = 'block';
          card.argsPre.textContent = '[args]\n' + argsText;
        }
        if ((data.toolName || '') === 'todo_write') {
          renderTodoPlan(card, data.argsPreview, null);
        }
      }

      function handleToolEndEvent(data) {
        if (!currentAssistant) return;
        closeCurrentThinkingBlock(currentAssistant, 'tool');
        const card = ensureToolCard(currentAssistant, data);
        if (!card) return;
        const status = data.status || 'success';
        card.details.dataset.status = status;
        const durationPart =
          data.durationMs !== undefined && data.durationMs !== null
            ? ' · ' + data.durationMs + 'ms'
            : '';
        card.summary.textContent = '工具' + (status === 'success' ? '完成' : '结束') +
          '：' + (data.toolName || 'unknown') + durationPart;
        card.metaEl.textContent =
          '状态: ' + status +
          (data.roundId !== undefined && data.roundId !== null ? ' · round=' + data.roundId : '');
        const resultText = formatPreview(data.resultPreview);
        if (resultText) {
          card.resultPre.style.display = 'block';
          card.resultPre.textContent = '[result]\n' + resultText;
        }
        if (data.error) {
          card.resultPre.style.display = 'block';
          card.resultPre.textContent += '\n[error]\n' + data.error;
        }
        if ((data.toolName || '') === 'todo_write') {
          renderTodoPlan(card, data.argsPreview, data.resultPreview);
        }
      }

      function handleThinkingEvent(data) {
        if (!currentAssistant || !currentAssistant.thinkingContainer) return;
        const content = data && data.content ? data.content : '';
        if (!content) return;
        const roundId = data && data.roundId !== undefined && data.roundId !== null ? data.roundId : null;
        if (currentAssistant.thinkingContainer) {
          currentAssistant.thinkingContainer.style.display = 'block';
        }
        const blockKey = 'round::' + String(roundId);

        const roundChanged =
          roundId !== null &&
          currentAssistant.lastThinkingRoundId !== undefined &&
          currentAssistant.lastThinkingRoundId !== null &&
          roundId !== currentAssistant.lastThinkingRoundId;
        if (
          currentAssistant.lastEventType !== 'thinking' ||
          !currentAssistant.currentThinkingEl ||
          roundChanged ||
          currentAssistant.currentThinkingBlockKey !== blockKey
        ) {
          const wrapper = document.createElement('div');
          wrapper.className = 'thinking-block';
          const head = document.createElement('div');
          head.className = 'thinking-head';
          const title = document.createElement('div');
          title.className = 'thinking-title';
          title.textContent = '思考';
          head.appendChild(title);
          if (roundId !== null) {
            const roundLabel = document.createElement('div');
            roundLabel.className = 'thinking-round';
            roundLabel.textContent = '第 ' + roundId + ' 轮思考';
            head.appendChild(roundLabel);
          }
          wrapper.appendChild(head);
          const sourceMeta = document.createElement('div');
          sourceMeta.className = 'thinking-source-meta';
          sourceMeta.style.display = 'none';
          wrapper.appendChild(sourceMeta);
          const box = document.createElement('div');
          box.className = 'thinking-content';
          wrapper.appendChild(box);
          currentAssistant.thinkingContainer.appendChild(wrapper);
          currentAssistant.currentThinkingWrapper = wrapper;
          currentAssistant.currentThinkingEl = box;
          currentAssistant.currentThinkingTitleEl = title;
          currentAssistant.currentThinkingSourceMetaEl = sourceMeta;
          currentAssistant.currentThinkingSources = [];
          currentAssistant.currentThinkingBlockKey = blockKey;
        }

        updateThinkingSourceSummary(currentAssistant, data && data.source ? data.source : '');
        currentAssistant.currentThinkingEl.textContent += content;
        if (roundId !== null) {
          currentAssistant.lastThinkingRoundId = roundId;
        }
        currentAssistant.lastEventType = 'thinking';
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function handleContentEvent(data) {
        if (!currentAssistant || !currentAssistant.contentEl) return;
        closeCurrentThinkingBlock(currentAssistant, 'content');
        const content = data && data.content ? data.content : '';
        if (!content) return;
        currentAssistant.contentEl.textContent += content;
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function handleStreamEvent(data) {
        if (!data || !data.type) return;
        const sequenceId = Number(data.sequenceId);
        if (
          currentAssistant &&
          Number.isFinite(sequenceId) &&
          currentAssistant.lastSequenceId !== null &&
          currentAssistant.lastSequenceId !== undefined &&
          sequenceId <= currentAssistant.lastSequenceId
        ) {
          return;
        }
        if (currentAssistant && Number.isFinite(sequenceId)) {
          currentAssistant.lastSequenceId = sequenceId;
        }
        if (data.turnId && currentAssistant && !currentAssistant.turnId) {
          currentAssistant.turnId = data.turnId;
        }
        if (data.type === 'turn_start') {
          handleTurnStartEvent(data);
          return;
        }
        if (data.type === 'turn_end') {
          handleTurnEndEvent(data);
          return;
        }
        if (data.type === 'tool_start') {
          handleToolStartEvent(data);
          return;
        }
        if (data.type === 'tool_end') {
          handleToolEndEvent(data);
          return;
        }
        if (data.type === 'thinking') {
          handleThinkingEvent(data);
          return;
        }
        if (data.type === 'content' || data.type === 'delta') {
          handleContentEvent({ content: data.content || '' });
          return;
        }
        if (data.type === 'session_switched') {
          if (data.sessionId && sessionIdInput) {
            sessionIdInput.value = data.sessionId;
            updateSessionStatus('会话已切换');
          }
          return;
        }
        if (data.type === 'error') {
          const message = data.content || data.error || '流式请求失败';
          handleContentEvent({ content: '\n[错误] ' + message });
          return;
        }
      }

      async function sendPrompt() {
        const text = promptInput.value.trim();
        if (!text || isStreaming) return;
        
        clearEmptyState();
        appendMessage('user', text);
        promptInput.value = '';
        setSendingState(true);
        streamDone = false;
        const streamId = activeStreamId + 1;
        activeStreamId = streamId;
        const abortController = new AbortController();
        currentAbortController = abortController;
        const streamAssistant = appendMessage('assistant', '');
        currentAssistant = streamAssistant;

        const sid = sessionIdInput.value;
        const provider = providerSel.value;
        const mode = modeSel.value;
        const toolsEnabled = toolsSel.value === 'true';
        const streamPath = mode === 'llm'
          ? `/api/llm/${encodeURIComponent(provider)}/stream`
          : `/api/agent/${encodeURIComponent(provider)}/stream`;
        const query = new URLSearchParams({
          prompt: text,
          sessionId: sid,
          userId: currentUserId(),
          tools: String(toolsEnabled),
          toolChoice: 'AUTO'
        });
        const url = apiUrl(streamPath + '?' + query.toString());

        try {
          const response = await fetch(url, {
            method: 'GET',
            signal: abortController.signal
          });
          if (!response.ok) {
            throw new Error('Request failed: ' + response.status);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            if (streamId !== activeStreamId) {
              await reader.cancel();
              break;
            }
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              if (line.startsWith('data:')) {
                const dataStr = line.substring(5).trim();
                if (dataStr === '[DONE]') {
                  streamDone = true;
                  break;
                }
                try {
                  const data = JSON.parse(dataStr);
                  if (streamId === activeStreamId) {
                    handleStreamEvent(data);
                  }
                } catch (e) {
                  console.error('Failed to parse SSE data:', e);
                }
              }
            }
          }
        } catch (error) {
          const aborted = abortController.signal.aborted || (error && error.name === 'AbortError');
          if (aborted) {
            return;
          }
          console.error('Stream error:', error);
          if (streamAssistant && streamAssistant.contentEl) {
            streamAssistant.contentEl.textContent = '发送失败: ' + error.message;
          }
        } finally {
          if (currentAbortController === abortController) {
            currentAbortController = null;
          }
          if (streamId === activeStreamId) {
            setSendingState(false);
          }
          es = null;
        }
      }

      sendBtn.addEventListener('click', sendPrompt);
      promptInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendPrompt();
        }
      });

      clearBtn.addEventListener('click', () => {
        if (confirm('确定要清空聊天记录吗？')) {
          clearChatBox();
        }
      });

      newSessionBtn.addEventListener('click', createSession);
      loadSessionBtn.addEventListener('click', loadSessionHistory);
      historySessionSel.addEventListener('change', loadSessionHistory);
      refreshSessionsBtn.addEventListener('click', () => refreshSessions(true));
      refreshMemoryBtn.addEventListener('click', () => refreshMemoryFiles(false));
      openMemoryBtn.addEventListener('click', openMemoryFile);

      debugBtn.addEventListener('click', () => {
        alert(
          'API Base: ' + (apiBaseInput.value || '(同源)') + '\n' +
          'Provider: ' + providerSel.value + '\n' +
          'Mode: ' + modeSel.value + '\n' +
          'Tools: ' + toolsSel.value + '\n' +
          'User ID: ' + currentUserId() + '\n' +
          'Session ID: ' + sessionIdInput.value
        );
      });

      (async function init() {
        await refreshSessions(true);
        if (!(sessionIdInput.value || '').trim()) {
          await createSession();
        }
        await refreshMemoryFiles(false);
      })();
    </script>
  </body>
</html>
