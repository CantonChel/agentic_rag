<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 智能助手</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        color: #1f2937;
        overflow: hidden;
      }

      .app-container {
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        padding: 16px 24px;
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
      }

      .header-content {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 24px;
        font-weight: bold;
      }

      .logo-text h1 {
        font-size: 20px;
        font-weight: 600;
        color: #1f2937;
      }

      .logo-text p {
        font-size: 12px;
        color: #6b7280;
      }

      .nav-links {
        display: flex;
        gap: 16px;
        align-items: center;
      }

      .nav-link {
        padding: 8px 16px;
        background: white;
        color: #667eea;
        text-decoration: none;
        border-radius: 8px;
        border: 1px solid #667eea;
        transition: all 0.3s ease;
        font-weight: 500;
      }

      .nav-link:hover {
        background: #667eea;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      .main-content {
        flex: 1;
        display: flex;
        overflow: hidden;
        max-width: 1400px;
        width: 100%;
        margin: 0 auto;
      }

      .sidebar {
        width: 320px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-right: 1px solid rgba(255, 255, 255, 0.2);
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .config-section {
        background: white;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      .config-section h3 {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .config-section h3::before {
        content: '';
        width: 4px;
        height: 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 2px;
      }

      .form-group {
        margin-bottom: 12px;
      }

      .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: #6b7280;
        margin-bottom: 6px;
      }

      .form-control {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        font-size: 13px;
        transition: all 0.3s ease;
        background: #f9fafb;
      }

      .form-control:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      select.form-control {
        cursor: pointer;
      }

      .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      .btn-secondary {
        background: white;
        color: #667eea;
        border: 1px solid #e5e7eb;
      }

      .btn-secondary:hover {
        background: #f9fafb;
        border-color: #667eea;
      }

      .btn-danger {
        background: #ef4444;
        color: white;
      }

      .btn-danger:hover {
        background: #dc2626;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
      }

      .btn-group {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chat-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
      }

      .chat-header {
        padding: 16px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        background: white;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      .session-info {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
        color: #6b7280;
      }

      .session-badge {
        padding: 4px 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 500;
      }

      .messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .message {
        max-width: 80%;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        align-self: flex-end;
      }

      .message.assistant {
        align-self: flex-start;
      }

      .message-content {
        padding: 12px 16px;
        border-radius: 16px;
        line-height: 1.6;
        position: relative;
      }

      .message.user .message-content {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-bottom-right-radius: 4px;
      }

      .message.assistant .message-content {
        background: white;
        color: #1f2937;
        border: 1px solid #e5e7eb;
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      .thinking-section {
        margin-bottom: 12px;
        padding: 12px;
        background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        border-radius: 12px;
        border-left: 4px solid #667eea;
      }

      .thinking-title {
        font-size: 12px;
        font-weight: 600;
        color: #667eea;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .thinking-title::before {
        content: '💭';
      }

      .thinking-content {
        font-size: 13px;
        color: #4b5563;
        white-space: pre-wrap;
        line-height: 1.5;
      }

      .assistant-content {
        white-space: pre-wrap;
      }

      .input-area {
        padding: 20px 24px;
        background: white;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.05);
      }

      .input-wrapper {
        display: flex;
        gap: 12px;
        align-items: flex-end;
      }

      .input-field {
        flex: 1;
        position: relative;
      }

      .input-field textarea {
        width: 100%;
        min-height: 60px;
        max-height: 200px;
        padding: 12px 16px;
        border: 2px solid #e5e7eb;
        border-radius: 12px;
        font-size: 14px;
        resize: vertical;
        transition: all 0.3s ease;
        font-family: inherit;
      }

      .input-field textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .send-btn {
        padding: 12px 24px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .send-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
      }

      .send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
      }

      .send-btn::before {
        content: '➤';
      }

      .tools-panel {
        margin-top: 16px;
        padding: 16px;
        background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
        border-radius: 12px;
        border: 1px solid #e5e7eb;
      }

      .tools-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .tools-title {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
      }

      .tool-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .tool-item {
        padding: 8px 12px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        font-size: 12px;
        color: #4b5563;
      }

      .memory-panel {
        margin-top: 16px;
        padding: 16px;
        background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
        border-radius: 12px;
        border: 1px solid #e5e7eb;
      }

      .memory-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .memory-title {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
      }

      .memory-content {
        margin-top: 12px;
        padding: 12px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        min-height: 120px;
        max-height: 280px;
        overflow-y: auto;
        white-space: pre-wrap;
        line-height: 1.5;
        font-size: 13px;
        color: #4b5563;
      }

      .empty-state {
        text-align: center;
        padding: 48px 24px;
        color: #9ca3af;
      }

      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 16px;
      }

      .empty-state-text {
        font-size: 14px;
      }

      .scrollbar-thin::-webkit-scrollbar {
        width: 6px;
      }

      .scrollbar-thin::-webkit-scrollbar-track {
        background: #f3f4f6;
        border-radius: 3px;
      }

      .scrollbar-thin::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 3px;
      }

      .scrollbar-thin::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }

      @media (max-width: 1024px) {
        .sidebar {
          width: 280px;
        }
      }

      @media (max-width: 768px) {
        .main-content {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          max-height: 40vh;
          order: 2;
        }

        .chat-area {
          order: 1;
        }

        .message {
          max-width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <div class="header-content">
          <div class="logo">
            <div class="logo-icon">AI</div>
            <div class="logo-text">
              <h1>AI 智能助手</h1>
              <p>基于 RAG 的智能对话系统</p>
            </div>
          </div>
          <nav class="nav-links">
            <a href="/knowledge.html" class="nav-link">📚 知识库管理</a>
            <a href="/index.html" class="nav-link">🏠 首页</a>
          </nav>
        </div>
      </header>

      <div class="main-content">
        <aside class="sidebar scrollbar-thin">
          <div class="config-section">
            <h3>会话管理</h3>
            <div class="form-group">
              <label>历史会话</label>
              <select id="historySession" class="form-control"></select>
            </div>
            <div class="btn-group">
              <button class="btn btn-primary" id="newSessionBtn">新建会话</button>
              <button class="btn btn-secondary" id="loadSessionBtn">加载</button>
              <button class="btn btn-secondary" id="refreshSessionsBtn">刷新</button>
            </div>
            <div class="form-group" style="margin-top: 12px;">
              <label>当前会话 ID</label>
              <input type="text" id="sessionId" class="form-control" readonly />
            </div>
            <div class="form-group">
              <label>用户 ID</label>
              <input type="text" id="userId" class="form-control" placeholder="anonymous" />
            </div>
          </div>

          <div class="config-section">
            <h3>模型配置</h3>
            <div class="form-group">
              <label>API Base URL</label>
              <input type="text" id="apiBase" class="form-control" placeholder="留空表示同源" />
            </div>
            <div class="form-group">
              <label>提供商 (Provider)</label>
              <select id="provider" class="form-control">
                <option value="openai">OpenAI</option>
                <option value="minimax">MiniMax</option>
              </select>
            </div>
            <div class="form-group">
              <label>模式 (Mode)</label>
              <select id="mode" class="form-control">
                <option value="agent">Agent (智能代理)</option>
                <option value="llm">LLM (直接对话)</option>
              </select>
            </div>
            <div class="form-group">
              <label>工具调用</label>
              <select id="toolsEnabled" class="form-control">
                <option value="true">开启</option>
                <option value="false">关闭</option>
              </select>
            </div>
          </div>

          <div class="config-section">
            <h3>记忆文档</h3>
            <div class="form-group">
              <label>选择记忆文件</label>
              <select id="memoryFileSelect" class="form-control"></select>
            </div>
            <div class="btn-group">
              <button class="btn btn-secondary" id="refreshMemoryBtn">刷新</button>
              <button class="btn btn-primary" id="openMemoryBtn">打开</button>
            </div>
            <div id="memoryMeta" style="margin-top: 8px; font-size: 12px; color: #6b7280;">暂无记忆文档</div>
            <div id="memoryContent" class="memory-content scrollbar-thin"></div>
          </div>

          <div class="config-section">
            <h3>操作</h3>
            <div class="btn-group">
              <button class="btn btn-danger" id="clearBtn">清空聊天</button>
              <button class="btn btn-secondary" id="debugBtn">查看配置</button>
            </div>
          </div>
        </aside>

        <main class="chat-area">
          <div class="chat-header">
            <div class="session-info">
              <span class="session-badge" id="sessionBadge">新会话</span>
              <span id="sessionStatus">准备就绪</span>
            </div>
          </div>

          <div id="chatBox" class="messages-container scrollbar-thin">
            <div class="empty-state">
              <div class="empty-state-icon">💬</div>
              <div class="empty-state-text">开始一段新的对话吧！</div>
            </div>
          </div>

          <div class="input-area">
            <div class="input-wrapper">
              <div class="input-field">
                <textarea id="promptInput" placeholder="输入您的问题，例如：用两句话解释 RAG"></textarea>
              </div>
              <button class="send-btn" id="sendBtn">发送</button>
            </div>
            <div style="margin-top: 8px; font-size: 12px; color: #9ca3af;">
              提示：发送后会调用 SSE 接口并按 delta 拼接回复，done 结束。
            </div>
          </div>
        </main>
      </div>
    </div>

    <script>
      const apiBaseInput = document.getElementById('apiBase');
      const providerSel = document.getElementById('provider');
      const modeSel = document.getElementById('mode');
      const toolsSel = document.getElementById('toolsEnabled');
      const userIdInput = document.getElementById('userId');
      const sessionIdInput = document.getElementById('sessionId');
      const historySessionSel = document.getElementById('historySession');
      const loadSessionBtn = document.getElementById('loadSessionBtn');
      const refreshSessionsBtn = document.getElementById('refreshSessionsBtn');
      const newSessionBtn = document.getElementById('newSessionBtn');
      const clearBtn = document.getElementById('clearBtn');
      const chatBox = document.getElementById('chatBox');
      const promptInput = document.getElementById('promptInput');
      const sendBtn = document.getElementById('sendBtn');
      const debugBtn = document.getElementById('debugBtn');
      const refreshMemoryBtn = document.getElementById('refreshMemoryBtn');
      const openMemoryBtn = document.getElementById('openMemoryBtn');
      const memoryFileSelect = document.getElementById('memoryFileSelect');
      const memoryMeta = document.getElementById('memoryMeta');
      const memoryContent = document.getElementById('memoryContent');
      const sessionBadge = document.getElementById('sessionBadge');
      const sessionStatus = document.getElementById('sessionStatus');

      let es = null;
      let currentAssistant = null;
      let isStreaming = false;
      let streamDone = false;

      function apiUrl(path) {
        const base = (apiBaseInput.value || '').trim();
        return base ? base + path : path;
      }

      function newSessionId() {
        return 'web-' + Date.now();
      }

      function currentUserId() {
        return (userIdInput && userIdInput.value ? userIdInput.value : '').trim() || 'anonymous';
      }

      function formatBytes(n) {
        const v = Number(n || 0);
        if (!Number.isFinite(v) || v <= 0) return '0 B';
        if (v < 1024) return v + ' B';
        if (v < 1024 * 1024) return (v / 1024).toFixed(1) + ' KB';
        return (v / (1024 * 1024)).toFixed(1) + ' MB';
      }

      function formatTime(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return d.toLocaleString();
      }

      function updateSessionStatus(status) {
        if (sessionStatus) {
          sessionStatus.textContent = status;
        }
      }

      function clearEmptyState() {
        const emptyState = chatBox.querySelector('.empty-state');
        if (emptyState) {
          emptyState.remove();
        }
      }

      function appendMessage(role, text) {
        clearEmptyState();
        
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message ' + (role === 'user' ? 'user' : 'assistant');
        
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        
        let thinkingContainer = null;
        let thinkingTitleEl = null;
        let assistantContentEl = null;

        if (role === 'assistant') {
          thinkingTitleEl = document.createElement('div');
          thinkingTitleEl.className = 'thinking-title';
          thinkingTitleEl.textContent = '思考';
          thinkingTitleEl.style.display = 'none';
          contentDiv.appendChild(thinkingTitleEl);

          thinkingContainer = document.createElement('div');
          thinkingContainer.className = 'thinking-section';
          thinkingContainer.style.display = 'none';
          contentDiv.appendChild(thinkingContainer);

          assistantContentEl = document.createElement('div');
          assistantContentEl.className = 'assistant-content';
          assistantContentEl.textContent = text || '';
          contentDiv.appendChild(assistantContentEl);
        } else {
          contentDiv.textContent = text || '';
        }

        messageDiv.appendChild(contentDiv);
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        
        return {
          container: messageDiv,
          contentEl: assistantContentEl || contentDiv,
          thinkingContainer,
          thinkingTitleEl,
          currentThinkingEl: null,
          lastEventType: null,
          lastThinkingRoundId: null
        };
      }

      async function createSession() {
        try {
          updateSessionStatus('创建会话中...');
          const query = new URLSearchParams({ userId: currentUserId() });
          const res = await fetch(apiUrl('/api/sessions') + '?' + query.toString(), { method: 'POST' });
          if (!res.ok) throw new Error('create session failed: ' + res.status);
          const data = await res.json();
          sessionIdInput.value = data.sessionId || newSessionId();
          if (sessionBadge) {
            sessionBadge.textContent = '会话: ' + sessionIdInput.value.substring(0, 12) + '...';
          }
          await refreshSessions();
          if (historySessionSel) {
            historySessionSel.value = sessionIdInput.value;
          }
          updateSessionStatus('会话已创建');
        } catch (_) {
          sessionIdInput.value = newSessionId();
          if (sessionBadge) {
            sessionBadge.textContent = '会话: ' + sessionIdInput.value.substring(0, 12) + '...';
          }
          updateSessionStatus('会话创建失败，使用本地ID');
        }
      }

      function stopStream() {
        if (es) {
          es.close();
          es = null;
        }
        setSendingState(false);
      }

      function clearChatBox() {
        chatBox.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><div class="empty-state-text">开始一段新的对话吧！</div></div>';
      }

      function appendThinkingOnly(text) {
        const msg = appendMessage('assistant', '');
        if (!msg) return;
        if (msg.thinkingTitleEl) {
          msg.thinkingTitleEl.style.display = 'block';
        }
        if (msg.thinkingContainer) {
          msg.thinkingContainer.style.display = 'block';
          const box = document.createElement('div');
          box.className = 'thinking-content';
          box.textContent = text || '';
          msg.thinkingContainer.appendChild(box);
          msg.currentThinkingEl = box;
          msg.lastEventType = 'thinking';
        }
        if (msg.contentEl) {
          msg.contentEl.textContent = '';
        }
      }

      function appendThinkingToMessage(target, text) {
        if (!target || !text) return;
        if (target.thinkingTitleEl) {
          target.thinkingTitleEl.style.display = 'block';
        }
        if (!target.thinkingContainer) return;
        target.thinkingContainer.style.display = 'block';
        const box = document.createElement('div');
        box.className = 'thinking-content';
        box.textContent = text || '';
        target.thinkingContainer.appendChild(box);
      }

      function setSendingState(sending) {
        isStreaming = !!sending;
        if (sendBtn) {
          sendBtn.disabled = isStreaming;
        }
        if (isStreaming) {
          updateSessionStatus('AI 正在思考...');
        } else {
          updateSessionStatus('准备就绪');
        }
      }

      async function refreshSessions(autoLoad = true) {
        if (!historySessionSel) return;
        const previous = (historySessionSel.value || sessionIdInput.value || '').trim();
        try {
          const query = new URLSearchParams({ userId: currentUserId() });
          const res = await fetch(apiUrl('/api/sessions') + '?' + query.toString());
          if (!res.ok) throw new Error('list sessions failed: ' + res.status);
          const data = await res.json();
          historySessionSel.innerHTML = '';
          if (Array.isArray(data)) {
            const ids = [];
            for (const item of data) {
              const opt = document.createElement('option');
              opt.value = item.sessionId || item.id || '';
              opt.textContent = opt.value || 'unknown';
              historySessionSel.appendChild(opt);
              if (opt.value) ids.push(opt.value);
            }
            if (ids.length > 0) {
              const selected = ids.includes(previous) ? previous : ids[0];
              historySessionSel.value = selected;
              sessionIdInput.value = selected;
              if (sessionBadge) {
                sessionBadge.textContent = '会话: ' + selected.substring(0, 12) + '...';
              }
              if (autoLoad) {
                await loadSessionHistoryById(selected);
              }
            } else {
              sessionIdInput.value = '';
              clearChatBox();
            }
          }
        } catch (_) {
          historySessionSel.innerHTML = '';
          sessionIdInput.value = '';
        }
      }

      async function refreshMemoryFiles(autoOpen = false) {
        if (!memoryFileSelect || !memoryMeta || !memoryContent) return;
        memoryMeta.textContent = '正在加载记忆文件...';
        memoryContent.textContent = '';
        memoryFileSelect.innerHTML = '';
        try {
          const query = new URLSearchParams({ userId: currentUserId(), includeGlobal: 'true' });
          const res = await fetch(apiUrl('/api/memory/files') + '?' + query.toString());
          if (!res.ok) throw new Error('list memory files failed: ' + res.status);
          const data = await res.json();
          if (!Array.isArray(data) || data.length === 0) {
            memoryMeta.textContent = '暂无记忆文档';
            return;
          }
          for (const file of data) {
            const opt = document.createElement('option');
            opt.value = file.id || '';
            const kind = file.kind || 'memory';
            opt.textContent = (file.path || file.id || 'unknown') + ' [' + kind + ']';
            memoryFileSelect.appendChild(opt);
          }
          memoryMeta.textContent = '已加载 ' + data.length + ' 个记忆文档';
          if (autoOpen) {
            await openMemoryFile();
          }
        } catch (_) {
          memoryMeta.textContent = '记忆文件加载失败';
        }
      }

      async function openMemoryFile() {
        if (!memoryFileSelect || !memoryMeta || !memoryContent) return;
        const id = (memoryFileSelect.value || '').trim();
        if (!id) {
          memoryMeta.textContent = '请先选择一个记忆文档';
          return;
        }
        memoryMeta.textContent = '正在读取文档...';
        memoryContent.textContent = '';
        try {
          const query = new URLSearchParams({ userId: currentUserId(), id });
          const res = await fetch(apiUrl('/api/memory/file') + '?' + query.toString());
          if (!res.ok) throw new Error('open memory file failed: ' + res.status);
          const data = await res.json();
          memoryContent.textContent = data.content || '';
          memoryMeta.textContent =
            (data.path || id) +
            ' · ' +
            (data.kind || 'memory') +
            ' · ' +
            formatBytes(data.size) +
            ' · ' +
            formatTime(data.updatedAt);
        } catch (_) {
          memoryMeta.textContent = '读取记忆文档失败';
        }
      }

      async function loadSessionHistoryById(sid) {
        if (!sid) return;
        try {
          const query = new URLSearchParams({ userId: currentUserId() });
          const res = await fetch(apiUrl(`/api/sessions/${encodeURIComponent(sid)}/messages`) + '?' + query.toString());
          if (!res.ok) throw new Error('load messages failed: ' + res.status);
          const data = await res.json();
          clearChatBox();
          let lastAssistantMsg = null;
          if (Array.isArray(data)) {
            for (const msg of data) {
              if (!msg || !msg.type) continue;
              if (msg.type === 'USER') {
                appendMessage('user', msg.content || '');
                lastAssistantMsg = null;
              } else if (msg.type === 'ASSISTANT') {
                lastAssistantMsg = appendMessage('assistant', msg.content || '');
              } else if (msg.type === 'THINKING') {
                if (lastAssistantMsg) {
                  appendThinkingToMessage(lastAssistantMsg, msg.content || '');
                } else {
                  appendThinkingOnly(msg.content || '');
                }
              }
            }
          }
          sessionIdInput.value = sid;
        } catch (_) {
          // ignore load errors
        }
      }

      async function loadSessionHistory() {
        const sid = historySessionSel && historySessionSel.value ? historySessionSel.value : '';
        await loadSessionHistoryById(sid);
      }

      function handleThinkingEvent(data) {
        if (!currentAssistant || !currentAssistant.thinkingContainer) return;
        const content = data && data.content ? data.content : '';
        if (!content) return;
        const roundId = data && data.roundId !== undefined && data.roundId !== null ? data.roundId : null;
        if (data && data.source && currentAssistant.thinkingTitleEl) {
          currentAssistant.thinkingTitleEl.textContent = '思考 · ' + data.source;
        }
        if (currentAssistant.thinkingTitleEl) {
          currentAssistant.thinkingTitleEl.style.display = 'block';
        }
        if (currentAssistant.thinkingContainer) {
          currentAssistant.thinkingContainer.style.display = 'block';
        }

        const roundChanged =
          roundId !== null &&
          currentAssistant.lastThinkingRoundId !== undefined &&
          currentAssistant.lastThinkingRoundId !== null &&
          roundId !== currentAssistant.lastThinkingRoundId;
        if (
          currentAssistant.lastEventType !== 'thinking' ||
          !currentAssistant.currentThinkingEl ||
          roundChanged
        ) {
          const box = document.createElement('div');
          box.className = 'thinking-content';
          currentAssistant.thinkingContainer.appendChild(box);
          currentAssistant.currentThinkingEl = box;
        }

        currentAssistant.currentThinkingEl.textContent += content;
        if (roundId !== null) {
          currentAssistant.lastThinkingRoundId = roundId;
        }
        currentAssistant.lastEventType = 'thinking';
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function handleContentEvent(data) {
        if (!currentAssistant || !currentAssistant.contentEl) return;
        const content = data && data.content ? data.content : '';
        if (!content) return;
        currentAssistant.contentEl.textContent += content;
        currentAssistant.lastEventType = 'content';
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      async function sendPrompt() {
        const text = promptInput.value.trim();
        if (!text || isStreaming) return;
        
        clearEmptyState();
        appendMessage('user', text);
        promptInput.value = '';
        setSendingState(true);
        streamDone = false;
        currentAssistant = appendMessage('assistant', '');

        const sid = sessionIdInput.value;
        const provider = providerSel.value;
        const mode = modeSel.value;
        const toolsEnabled = toolsSel.value === 'true';
        const query = new URLSearchParams({
          provider,
          mode,
          tools: String(toolsEnabled),
          userId: currentUserId()
        });

        const body = { prompt: text, sessionId: sid };
        const url = apiUrl('/api/chat?' + query.toString());

        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          if (!response.ok) {
            throw new Error('Request failed: ' + response.status);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              if (line.startsWith('data:')) {
                const dataStr = line.substring(5).trim();
                if (dataStr === '[DONE]') {
                  streamDone = true;
                  break;
                }
                try {
                  const data = JSON.parse(dataStr);
                  if (data.type === 'thinking') {
                    handleThinkingEvent(data);
                  } else if (data.type === 'content') {
                    handleContentEvent(data);
                  }
                } catch (e) {
                  console.error('Failed to parse SSE data:', e);
                }
              }
            }
          }
        } catch (error) {
          console.error('Stream error:', error);
          if (currentAssistant && currentAssistant.contentEl) {
            currentAssistant.contentEl.textContent = '发送失败: ' + error.message;
          }
        } finally {
          setSendingState(false);
          es = null;
        }
      }

      sendBtn.addEventListener('click', sendPrompt);
      promptInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendPrompt();
        }
      });

      clearBtn.addEventListener('click', () => {
        if (confirm('确定要清空聊天记录吗？')) {
          clearChatBox();
        }
      });

      newSessionBtn.addEventListener('click', createSession);
      loadSessionBtn.addEventListener('click', loadSessionHistory);
      refreshSessionsBtn.addEventListener('click', () => refreshSessions(true));
      refreshMemoryBtn.addEventListener('click', () => refreshMemoryFiles(false));
      openMemoryBtn.addEventListener('click', openMemoryFile);

      debugBtn.addEventListener('click', () => {
        alert(
          'API Base: ' + (apiBaseInput.value || '(同源)') + '\n' +
          'Provider: ' + providerSel.value + '\n' +
          'Mode: ' + modeSel.value + '\n' +
          'Tools: ' + toolsSel.value + '\n' +
          'User ID: ' + currentUserId() + '\n' +
          'Session ID: ' + sessionIdInput.value
        );
      });

      (async function init() {
        await createSession();
        await refreshMemoryFiles(false);
      })();
    </script>
  </body>
</html>
