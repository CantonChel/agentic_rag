spring.application.name=agentic-rag-app
server.port=8081
server.netty.max-initial-line-length=${SERVER_NETTY_MAX_INITIAL_LINE_LENGTH:16384}
server.netty.max-header-size=${SERVER_NETTY_MAX_HEADER_SIZE:16384}

llm.openai.api-key=${OPENAI_API_KEY:}
llm.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
llm.openai.model=${OPENAI_MODEL:gpt-4o-mini}

llm.minimax.api-key=${MINIMAX_API_KEY:}
llm.minimax.base-url=${MINIMAX_BASE_URL:https://api.minimaxi.com/v1}
llm.minimax.model=${MINIMAX_MODEL:MiniMax-M2.7}

# 系统提示词（英文正文，中文注释；与工具契约保持一致）
prompt.system.base=### Role\n\
You are an intelligent retrieval assistant powered by Progressive Agentic RAG. You operate in a multi-tenant environment with strictly isolated knowledge bases. Your core philosophy is \"Evidence-First\": you never rely on internal parametric knowledge but construct answers solely from verified data retrieved from the Knowledge Base (KB) or Web (if enabled).\n\
\n\
### Mission\n\
Deliver accurate, traceable, and verifiable answers by orchestrating a disciplined retrieval + reasoning process. You must plan when tasks are complex, retrieve evidence first, and think before answering.\n\
\n\
### Workflow\n\
1. Analyze: Understand the user's request and constraints.\n\
2. Plan: If the task is complex or multi-step, call todo_write to create a retrieval plan.\n\
3. Retrieve: Use available tools to gather evidence.\n\
4. Think: Use the thinking tool to reason, synthesize, or correct.\n\
5. Answer: Provide the final user-facing response. Do NOT expose tool names.\n\
\n\
### Tool Guidelines\n\
- todo_write: Only for retrieval/research tasks. No synthesis or final answers.\n\
- thinking: Only for reasoning, synthesis, evaluation, or correction.\n\
- Other tools: Use as needed, but never expose tool names to the user.\n\
\n\
### When to Use thinking (MANDATORY TRIGGERS)\n\
You MUST call thinking if any of the following apply:\n\
- The task requires comparison, tradeoff analysis, or evaluation\n\
- The task requires multi-step reasoning or correction\n\
- The answer must synthesize multiple evidence sources\n\
- You are about to provide a non-trivial final response\n\
\n\
### When to Use todo_write (MANDATORY TRIGGERS)\n\
You MUST call todo_write if any of the following apply:\n\
- The task needs 3+ retrieval/research actions\n\
- The user explicitly requests a plan or list\n\
- The user provides multiple parallel tasks\n\
\n\
### Constraints\n\
- Do NOT output chain-of-thought or <think> in assistant content.\n\
- All reasoning must go through the thinking tool.\n\
- If no tool calls and no reasoning fields are available, answer directly.\n\
- When you need domain knowledge you are not sure about, call knowledge_search first.\n\
- After you use a retrieval tool, you will receive reference material inside <context>.\n\
- You must answer strictly based on <context> and cite sources like [引用 1].\n\
- If <context> does not contain the needed information, reply exactly: 知识库中暂无相关信息.\n\
\n\
### System Status\n\
Current Time: {{current_time}}\n\
Web Search: {{web_search_status}}

chat.memory.window.max-messages=40

memory.enabled=true
memory.workspace-root=${MEMORY_WORKSPACE_ROOT:..}
memory.user-memory-base-dir=${MEMORY_USER_BASE_DIR:memory/users}
memory.include-transcripts=${MEMORY_INCLUDE_TRANSCRIPTS:false}
memory.transcript-max-messages-per-session=${MEMORY_TRANSCRIPT_MAX_MESSAGES:30}
memory.flush-enabled=${MEMORY_FLUSH_ENABLED:true}
memory.pre-compaction-flush-enabled=${MEMORY_PRE_COMPACTION_FLUSH_ENABLED:true}
memory.session-reset-flush-enabled=${MEMORY_SESSION_RESET_FLUSH_ENABLED:true}
memory.flush-recent-messages=${MEMORY_FLUSH_RECENT_MESSAGES:12}
memory.flush-provider=${MEMORY_FLUSH_PROVIDER:minimax}
memory.flush-model=${MEMORY_FLUSH_MODEL:}
memory.flush-max-completion-tokens=${MEMORY_FLUSH_MAX_COMPLETION_TOKENS:700}
memory.flush-input-max-chars=${MEMORY_FLUSH_INPUT_MAX_CHARS:6000}
memory.session-snapshot-recent-messages=${MEMORY_SESSION_SNAPSHOT_RECENT_MESSAGES:15}
memory.slug-max-length=${MEMORY_SLUG_MAX_LENGTH:64}
memory.max-chunk-chars=${MEMORY_MAX_CHUNK_CHARS:800}
memory.chunk-overlap-chars=${MEMORY_CHUNK_OVERLAP_CHARS:80}
memory.top-k-candidates=${MEMORY_TOPK_CANDIDATES:20}
memory.top-k=${MEMORY_TOPK:5}

agent.max-iterations=6
context.session.max-tokens=${CONTEXT_SESSION_MAX_TOKENS:600}
context.session.max-bytes=${CONTEXT_SESSION_MAX_BYTES:1200}
context.session.keep-last-messages=20

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/agentic_rag}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USER:agentic}
spring.datasource.password=${DB_PASSWORD:agentic}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
rag.retriever.postgres.enabled=${RAG_RETRIEVER_POSTGRES_ENABLED:true}
rag.vector-store.postgres.enabled=${RAG_VECTOR_STORE_POSTGRES_ENABLED:true}
rag.postgres.auto-index=${RAG_POSTGRES_AUTO_INDEX:true}

spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}

rag.loader.text.root-dir=

rag.splitter.recursive.chunk-size=500
rag.splitter.recursive.chunk-overlap=50

rag.embedding.openai.model=text-embedding-3-small
rag.embedding.openai.batch-size=64

rag.embedding.provider=${RAG_EMBEDDING_PROVIDER:siliconflow}

rag.embedding.siliconflow.base-url=https://api.siliconflow.cn/v1
rag.embedding.siliconflow.api-key=${SILICONFLOW_API_KEY:}
rag.embedding.siliconflow.model=BAAI/bge-large-zh-v1.5
rag.embedding.siliconflow.batch-size=64
agent.tool-timeout-seconds=30

ingest.async.enabled=${INGEST_ASYNC_ENABLED:true}
ingest.async.pipeline-version=${INGEST_PIPELINE_VERSION:v1}
ingest.async.max-retry=${INGEST_MAX_RETRY:5}
ingest.async.poll-timeout-seconds=${INGEST_POLL_TIMEOUT_SECONDS:2}
ingest.async.lease-seconds=${INGEST_LEASE_SECONDS:180}
ingest.async.worker-core-pool-size=${INGEST_WORKER_CORE:4}
ingest.async.worker-max-pool-size=${INGEST_WORKER_MAX:16}
ingest.async.worker-queue-capacity=${INGEST_WORKER_QUEUE:1000}
ingest.async.retry-replay-interval-ms=${INGEST_RETRY_REPLAY_INTERVAL_MS:3000}
ingest.async.lease-recover-interval-ms=${INGEST_LEASE_RECOVER_INTERVAL_MS:30000}

ingest.queue.redis.ready-key=rag:docparse:ready
ingest.queue.redis.processing-key=rag:docparse:processing
ingest.queue.redis.retry-key=rag:docparse:retry
ingest.queue.redis.dlq-key=rag:docparse:dlq

ingest.file-storage.backend=${INGEST_FILE_STORAGE_BACKEND:local}
ingest.file-storage.root-dir=${INGEST_FILE_ROOT:./data/knowledge-files}
ingest.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
ingest.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
ingest.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
ingest.minio.bucket=${MINIO_BUCKET:agentic-rag}
ingest.minio.secure=${MINIO_SECURE:false}
ingest.minio.presign-expiry-seconds=${MINIO_PRESIGN_EXPIRY_SECONDS:3600}

docreader.base-url=${DOCREADER_BASE_URL:http://localhost:8090}
docreader.jobs-path=${DOCREADER_JOBS_PATH:/jobs}
docreader.callback-base-url=${DOCREADER_CALLBACK_BASE_URL:http://localhost:8081}
docreader.callback-secret=${DOCREADER_CALLBACK_SECRET:}
docreader.signature-header=${DOCREADER_SIGNATURE_HEADER:X-Docreader-Signature}
docreader.timestamp-header=${DOCREADER_TIMESTAMP_HEADER:X-Docreader-Timestamp}
docreader.callback-max-skew-seconds=${DOCREADER_CALLBACK_MAX_SKEW_SECONDS:300}
