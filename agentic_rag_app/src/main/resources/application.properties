spring.application.name=agentic-rag-app
server.port=8081

llm.openai.api-key=${OPENAI_API_KEY:}
llm.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
llm.openai.model=${OPENAI_MODEL:gpt-4o-mini}

llm.minimax.api-key=${MINIMAX_API_KEY:}
llm.minimax.base-url=${MINIMAX_BASE_URL:https://api.minimaxi.com/v1}
llm.minimax.model=${MINIMAX_MODEL:MiniMax-M2.5}

prompt.system.base=You are an agentic assistant. Follow the system instructions strictly. Do not output chain-of-thought or <think> blocks. When the user asks for arithmetic, use the calculator tool if tools are available. When you need domain knowledge you are not sure about, call search_knowledge_base first. After you use a retrieval tool, you will receive reference material inside <context>. You must answer strictly based on <context> and cite sources like [引用 1]. If <context> does not contain the needed information, reply exactly: 知识库中暂无相关信息.

chat.memory.window.max-messages=40

agent.max-iterations=6
context.session.max-tokens=20000
context.session.keep-last-messages=20

spring.datasource.url=jdbc:h2:mem:agentic_rag;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

rag.loader.text.root-dir=

rag.splitter.recursive.chunk-size=500
rag.splitter.recursive.chunk-overlap=50

rag.embedding.openai.model=text-embedding-3-small
rag.embedding.openai.batch-size=64

rag.embedding.provider=${RAG_EMBEDDING_PROVIDER:siliconflow}

rag.embedding.siliconflow.base-url=https://api.siliconflow.cn/v1
rag.embedding.siliconflow.api-key=${SILICONFLOW_API_KEY:}
rag.embedding.siliconflow.model=BAAI/bge-large-zh-v1.5
rag.embedding.siliconflow.batch-size=64
agent.tool-timeout-seconds=30
