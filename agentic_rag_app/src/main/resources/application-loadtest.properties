# ============================================================
# Load Test Profile - H2 内存库，压测完即清
# ============================================================
# 启动方式:
#   LOADTEST_LLM_DELAY_MS=200 java -jar app.jar --spring.profiles.active=loadtest

# H2 内存数据库
spring.datasource.url=jdbc:h2:mem:loadtest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 连接池调优
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000

# 关闭 Redis（压测基础设施层不需要）
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# 排除依赖 Redis 的组件
spring.main.allow-bean-definition-overriding=true
ingest.redis-queue.enabled=false

# 关闭 Embedding 相关（Mock LLM 不需要）
rag.embedding.provider=none
rag.retriever.postgres.enabled=false
rag.vector-store.postgres.enabled=false
rag.postgres.auto-index=false

# 关闭 Ingest 异步（不需要文档入库）
ingest.async.enabled=false

# 关闭 Memory flush（Mock LLM 不需要总结）
memory.flush-enabled=false
memory.index-startup-sync-enabled=false
memory.watcher-enabled=false

# Agent 配置
agent.max-iterations=10
agent.tool-timeout-seconds=10

# 上下文窗口
context.session.max-tokens=400
context.session.max-bytes=800
context.session.keep-last-messages=10

# 日志级别
logging.level.com.agenticrag=INFO
logging.level.org.springframework=WARN
