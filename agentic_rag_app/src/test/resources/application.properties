spring.datasource.url=jdbc:h2:mem:agentic_rag_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
llm.openai.api-key=test-key
llm.openai.base-url=https://api.openai.com/v1
llm.minimax.api-key=test-key
llm.minimax.base-url=https://api.minimaxi.com/v1
rag.retriever.postgres.enabled=false
rag.vector-store.postgres.enabled=false
rag.postgres.auto-index=false
memory.index-startup-sync-enabled=false
memory.watcher-enabled=false
