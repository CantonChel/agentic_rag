services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentic-rag-postgres
    environment:
      POSTGRES_DB: agentic_rag
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: agentic
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic -d agentic_rag"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agentic-rag-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: agentic-rag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  docreader:
    build:
      context: ./docreader_service
    container_name: docreader-service
    environment:
      DOCREADER_PORT: 8090
      DOCREADER_WORKER_COUNT: 2
      DOCREADER_CALLBACK_SECRET: ${DOCREADER_CALLBACK_SECRET:-}
      DOCREADER_SIGNATURE_HEADER: X-Docreader-Signature
      DOCREADER_TIMESTAMP_HEADER: X-Docreader-Timestamp
      MINIO_ENDPOINT: ${MINIO_ENDPOINT_INTERNAL:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-agentic-rag}
      MINIO_SECURE: ${MINIO_SECURE:-false}
    volumes:
      - knowledge-files:/shared/knowledge-files
    ports:
      - "8090:8090"

  agentic-rag-app:
    build:
      context: ./agentic_rag_app
    container_name: agentic-rag-app
    environment:
      SERVER_PORT: 8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_URL: jdbc:postgresql://postgres:5432/agentic_rag
      DB_USER: agentic
      DB_PASSWORD: agentic
      INGEST_ASYNC_ENABLED: true
      INGEST_FILE_STORAGE_BACKEND: minio
      INGEST_FILE_ROOT: /shared/knowledge-files
      MINIO_ENDPOINT: ${MINIO_ENDPOINT_APP:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-agentic-rag}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      DOCREADER_BASE_URL: http://docreader:8090
      DOCREADER_CALLBACK_BASE_URL: http://agentic-rag-app:8081
      DOCREADER_CALLBACK_SECRET: ${DOCREADER_CALLBACK_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
    volumes:
      - knowledge-files:/shared/knowledge-files
      - app-data:/app/data
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docreader:
        condition: service_started
      minio:
        condition: service_started

volumes:
  pg-data:
  knowledge-files:
  app-data:
  minio-data:
